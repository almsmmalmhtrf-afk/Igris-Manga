<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أعمال شائعة | Igris Manga</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --p: #7d2ae8; --bg: #000000; --card: #0a0a0a; --side: #050505;       
            --text: #ffffff; --text-muted: #888888; --border: #151515;     
            --sub-bg: #111111; --glow: 0 0 25px rgba(125, 42, 232, 0.5); 
            --gold: #f1c40f; --heart: #ff4757;
            --gradient: linear-gradient(135deg, #7d2ae8, #45128e);
        }

        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; min-height: 100vh; }

        header { 
            background: rgba(0, 0, 0, 0.95); padding: 15px 5%; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 2px solid var(--p); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px);
        }

        .logo { font-size: 1.5rem; font-weight: 900; text-decoration: none; color: var(--p); text-shadow: var(--glow); }

        .home-link {
            text-decoration: none; color: #fff; background: var(--gradient);
            padding: 8px 20px; border-radius: 10px; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .home-link:hover { transform: scale(1.05); box-shadow: var(--glow); }

        .hot-banner {
            padding: 40px 5%; background: linear-gradient(to bottom, rgba(125, 42, 232, 0.1), transparent);
            text-align: center; border-bottom: 1px solid var(--border);
        }
        .hot-banner h1 { font-size: 2.5rem; margin: 0; color: #fff; text-shadow: var(--glow); }
        .hot-banner p { color: var(--text-muted); margin-top: 10px; }

        .manga-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); 
            gap: 25px; padding: 40px 5%; 
        }

        /* تصميم بطاقة الأعمال الشائعة */
        .hot-card {
            background: var(--card); border-radius: 15px; overflow: hidden;
            border: 1px solid var(--border); transition: 0.4s ease; text-decoration: none; color: inherit; display: block;
            position: relative;
        }
        .hot-card:hover { transform: translateY(-10px); border-color: var(--p); box-shadow: var(--glow); }

        .poster-box { position: relative; aspect-ratio: 2/3; overflow: hidden; }
        .poster-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .hot-card:hover .poster-box img { transform: scale(1.1); }

        .rank-badge {
            position: absolute; top: 10px; left: 10px; background: var(--gradient);
            color: white; width: 35px; height: 35px; display: flex; align-items: center;
            justify-content: center; border-radius: 50%; font-weight: 900; z-index: 5;
            box-shadow: 0 0 10px rgba(0,0,0,0.5); border: 2px solid #fff;
        }

        .stats-overlay {
            position: absolute; bottom: 10px; right: 10px; left: 10px;
            display: flex; justify-content: space-between; align-items: center; z-index: 2;
        }
        .hearts-tag {
            background: rgba(0, 0, 0, 0.85); color: var(--heart); padding: 4px 10px;
            border-radius: 8px; font-size: 0.8rem; font-weight: bold; backdrop-filter: blur(5px);
        }

        .info-box { padding: 15px; text-align: center; }
        .info-box h3 { font-size: 1rem; margin: 0 0 8px 0; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .rating { color: var(--gold); font-size: 0.85rem; display: flex; justify-content: center; gap: 4px; }

        #loading { text-align: center; padding: 100px; color: var(--p); font-size: 1.5rem; }

        @media (max-width: 600px) {
            .manga-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
            .hot-banner h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">IGRIS <span style="color:#fff">HOT</span></a>
        <a href="index.html" class="home-link"><i class="fas fa-home"></i> الرئيسية</a>
    </header>

    <div class="hot-banner">
        <h1>🔥 الأعمال الشائعة</h1>
        <p>المانجا الأكثر تفاعلاً من قبل جيش الظلال</p>
    </div>

    <div id="loading">
        <i class="fas fa-fire fa-spin"></i> جاري استدعاء القصص...
    </div>

    <div class="manga-grid" id="hotGrid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, query, orderByChild } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // نفس إعدادات قاعدة بياناتك
        const firebaseConfig = {
            apiKey: "AIzaSyDaosiZQoPCo4wdlSDy6UYs0b2PWbkkWXs",
            authDomain: "igrismanga-db.firebaseapp.com",
            databaseURL: "https://igrismanga-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "igrismanga-db",
            storageBucket: "igrismanga-db.appspot.com",
            appId: "1:40861137290:web:03cd9be7175620d4e23073"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // جلب البيانات مرتبة حسب القلوب (الـ hearts)
        const mangaRef = query(ref(db, 'manga'), orderByChild('hearts'));

        onValue(mangaRef, (snapshot) => {
            const grid = document.getElementById('hotGrid');
            grid.innerHTML = '';
            document.getElementById('loading').style.display = 'none';

            if (snapshot.exists()) {
                let mangas = [];
                snapshot.forEach(child => {
                    mangas.push({ id: child.key, ...child.val() });
                });

                // ترتيب من الأكبر للأصغر (الأكثر قلوباً أولاً)
                mangas.reverse().forEach((m, index) => {
                    const heartsCount = m.hearts >= 1000 ? (m.hearts/1000).toFixed(1) + 'k' : (m.hearts || 0);
                    
                    grid.innerHTML += `
                        <a href="reader.html?id=${m.id}" class="hot-card">
                            <div class="rank-badge">${index + 1}</div>
                            <div class="poster-box">
                                <img src="${m.cover}" loading="lazy">
                                <div class="stats-overlay">
                                    <span class="hearts-tag"><i class="fas fa-heart"></i> ${heartsCount}</span>
                                </div>
                            </div>
                            <div class="info-box">
                                <h3>${m.title}</h3>
                                <div class="rating">
                                    ${renderStars(m.rating)}
                                    <span style="color:var(--text-muted)">(${m.rating || '0.0'})</span>
                                </div>
                            </div>
                        </a>
                    `;
                });
            }
        });

        function renderStars(rating) {
            let stars = "";
            let r = Math.round(rating || 0);
            for(let i=1; i<=5; i++) {
                stars += i <= r ? '<i class="fas fa-star"></i>' : '<i class="far fa-star"></i>';
            }
            return stars;
        }
    </script>
</body>
</html>
