<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل - Igris</title>
    <style>
        body { font-family: sans-serif; background-color: #0c0e12; color: white; margin: 0; padding-bottom: 50px; }
        .admin-badge { 
            display: none; position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.9);
            border: 2px solid #00ff00; color: #00ff00; padding: 8px 15px; border-radius: 30px;
            font-size: 13px; font-weight: bold; z-index: 999; box-shadow: 0 0 15px #00ff00;
        }
        .admin-badge .dot { display: inline-block; width: 10px; height: 10px; background: #ff0000; border-radius: 50%; margin-right: 8px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .banner { width: 100%; height: 250px; background: linear-gradient(to bottom, transparent, #0c0e12), url('manga1.jpg') center/cover; }
        .content { padding: 20px; display: flex; flex-direction: column; align-items: center; margin-top: -100px; }
        .poster { width: 150px; height: 220px; border-radius: 15px; border: 3px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        
        .admin-panel { display: none; background: #1e2126; padding: 15px; border-radius: 12px; width: 100%; max-width: 400px; margin: 20px 0; border: 1px solid #00ff00; }
        .chapter-list { width: 100%; max-width: 500px; margin-top: 20px; }
        .chapter-item { display: flex; justify-content: space-between; background: #15181d; padding: 15px; border-radius: 12px; margin-bottom: 10px; text-decoration: none; color: white; border: 1px solid #222; }
    </style>
</head>
<body>
    <div id="adminBadge" class="admin-badge"><span class="dot"></span>وضع المالك قيد التفعيل</div>
    <div class="banner"></div>
    <div class="content">
        <img src="manga1.jpg" class="poster">
        <h1>King of the abyss</h1>
        <div id="adminPanel" class="admin-panel">
            <button onclick="alert('تعديل الوصف...')" style="width:100%; padding:10px; background:#e67e22; color:white; border:none; border-radius:8px;">⚙️ إدارة محتوى المانجا</button>
        </div>
        <div class="chapter-list">
            <a href="reader.html" class="chapter-item"><span>الفصل 1</span><span style="color:#00a8e8;">قراءة ⮕</span></a>
        </div>
        <a href="index.html" style="margin-top:20px; color:#666; text-decoration:none;">العودة للرئيسية</a>
    </div>
    <script>
        if(localStorage.getItem('role') === 'admin') {
            document.getElementById('adminBadge').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'block';
        }
    </script>
</body>
</html>
