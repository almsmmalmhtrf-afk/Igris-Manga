<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igris - الإدارة الإمبراطورية</title>
    <style>
        :root { --admin-green: #00ff00; --admin-red: #ff0000; --main-blue: #00a8e8; --bg-card: #15181d; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0c0e12; color: white; margin: 0; padding: 15px; }
        
        /* شعار المالك النابض */
        .admin-badge { display: none; position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.9); border: 2px solid var(--admin-green); color: var(--admin-green); padding: 8px 15px; border-radius: 30px; font-size: 13px; font-weight: bold; z-index: 10000; box-shadow: 0 0 15px var(--admin-green); }
        .admin-badge .dot { display: inline-block; width: 10px; height: 10px; background: var(--admin-red); border-radius: 50%; margin-left: 8px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        /* نافذة إضافة المانجا (Modal) */
        #addMangaModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 11000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .modal-content { max-width: 600px; margin: 0 auto; background: #1e2126; padding: 25px; border-radius: 20px; border: 1px solid var(--main-blue); }
        
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444; color: white; border-radius: 8px; }

        /* نظام المربعات */
        .selector-group { margin: 20px 0; }
        .selector-title { color: var(--main-blue); font-weight: bold; margin-bottom: 10px; display: block; border-right: 3px solid var(--main-blue); padding-right: 10px; }
        .tags-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag-box { padding: 8px 15px; background: var(--admin-red); color: white; border-radius: 6px; font-size: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.3s; user-select: none; }
        .tag-box.selected { background: #053a05; border-color: var(--admin-green); box-shadow: 0 0 10px var(--admin-green); }

        .add-btn-main { width: 100%; padding: 15px; background: var(--main-blue); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; }

        /* كارت المانجا المطور */
        .manga-card { display: flex; background: var(--bg-card); padding: 15px; border-radius: 18px; border: 1px solid #222; margin-bottom: 15px; align-items: flex-start; }
        .manga-info { flex: 1; padding-left: 15px; }
        .manga-title { font-size: 22px; font-weight: bold; color: white; text-decoration: none; display: block; margin-bottom: 8px; }
        .manga-meta { font-size: 11px; color: #888; margin-bottom: 10px; line-height: 1.6; }
        .manga-cover { width: 120px; height: 175px; border-radius: 12px; object-fit: cover; border: 1px solid #333; }
        
        .add-manga-trigger { display: none; width: 100%; background: #1e2126; border: 2px dashed var(--main-blue); color: var(--main-blue); padding: 15px; border-radius: 15px; text-align: center; font-weight: bold; margin-bottom: 25px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="adminBadge" class="admin-badge"><span class="dot"></span>وضع المالك قيد التفعيل</div>

    <div id="addMangaModal">
        <div class="modal-content">
            <h2 style="text-align: center; color: var(--main-blue);">إضافة عمل جديد إلى Igris</h2>
            
            <input type="text" id="newMangaName" placeholder="اسم المانجا / المانهوا...">
            <input type="text" id="newMangaCover" placeholder="اسم ملف الصورة (مثلاً manga1.jpg)...">

            <div class="selector-group">
                <span class="selector-title">التصنيفات (اختر ما تشاء):</span>
                <div class="tags-container" id="genresContainer">
                    </div>
            </div>

            <div class="selector-group">
                <span class="selector-title">حالة المانجا:</span>
                <div class="tags-container" id="statusContainer">
                    <div class="tag-box" onclick="selectSingle(this, 'statusContainer')">مستمرة</div>
                    <div class="tag-box" onclick="selectSingle(this, 'statusContainer')">مكتملة</div>
                    <div class="tag-box" onclick="selectSingle(this, 'statusContainer')">متوقفة</div>
                </div>
            </div>

            <div class="selector-group">
                <span class="selector-title">النوع:</span>
                <div class="tags-container" id="typeContainer">
                    <div class="tag-box" onclick="selectSingle(this, 'typeContainer')">مانجا</div>
                    <div class="tag-box" onclick="selectSingle(this, 'typeContainer')">مانهوا</div>
                    <div class="tag-box" onclick="selectSingle(this, 'typeContainer')">مانها</div>
                    <div class="tag-box" onclick="selectSingle(this, 'typeContainer')">ويب تون</div>
                    <div class="tag-box" onclick="selectSingle(this, 'typeContainer')">كوميكس</div>
                    <div class="tag-box" onclick="selectSingle(this, 'typeContainer')">رواية</div>
                </div>
            </div>

            <button class="add-btn-main" onclick="confirmAddManga()">نشر العمل في المملكة ✅</button>
            <button onclick="document.getElementById('addMangaModal').style.display='none'" style="width:100%; background:none; border:none; color:#666; margin-top:10px; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <div id="logo" onclick="handleAdminClicks()" style="cursor:pointer; color:var(--main-blue); font-weight:900; font-size:32px; margin-bottom:20px;">Igris</div>

    <div id="addMangaTrigger" class="add-manga-trigger" onclick="openAddModal()">+ إضافة مانهوا/مانجا جديدة</div>

    <div id="mangaList">
        </div>

    <script>
        const genres = ["دموي", "رومانسي", "ايسكاي", "أكشن", "مغامرة", "خيال", "دراما", "كوميديا", "شريحة من الحياة", "نفسي", "رعب", "غموض", "خارق للطبيعة", "فنون قتالية", "تاريخي", "مدرسي", "شوجو", "شونين", "سينين", "جوزيه", "رياضة", "خيال علمي", "ميكا", "طبخ"];

        // ملء التصنيفات
        const genCont = document.getElementById('genresContainer');
        genres.forEach(g => {
            let d = document.createElement('div');
            d.className = 'tag-box';
            d.innerText = g;
            d.onclick = function() { this.classList.toggle('selected'); };
            genCont.appendChild(d);
        });

        function selectSingle(el, containerId) {
            document.querySelectorAll(`#${containerId} .tag-box`).forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        }

        function handleAdminClicks() {
            window.ac = (window.ac || 0) + 1;
            if(window.ac === 7) {
                if(prompt("رمز المالك:") === "S24MD") { localStorage.setItem('role', 'admin'); location.reload(); }
                window.ac = 0;
            }
            setTimeout(() => { window.ac = 0; }, 2000);
        }

        function openAddModal() { document.getElementById('addMangaModal').style.display = 'block'; }

        function confirmAddManga() {
            const name = document.getElementById('newMangaName').value;
            const cover = document.getElementById('newMangaCover').value || 'manga1.jpg';
            const selectedGenres = Array.from(document.querySelectorAll('#genresContainer .selected')).map(el => el.innerText);
            const status = document.querySelector('#statusContainer .selected')?.innerText || 'غير محدد';
            const type = document.querySelector('#typeContainer .selected')?.innerText || 'غير محدد';

            if(!name) return alert("يرجى إدخال اسم المانجا");

            const list = document.getElementById('mangaList');
            const card = document.createElement('div');
            card.className = 'manga-card';
            card.innerHTML = `
                <div class="manga-info">
                    <button class="tag-box" style="background:#c0392b; margin-bottom:10px;" onclick="this.closest('.manga-card').remove()">حذف</button>
                    <a href="details.html" class="manga-title">${name}</a>
                    <div class="manga-meta">
                        <b>النوع:</b> ${type} | <b>الحالة:</b> ${status}<br>
                        <b>التصنيفات:</b> ${selectedGenres.join('، ')}
                    </div>
                    <a href="reader.html" style="color:var(--main-blue); text-decoration:none; font-weight:bold; font-size:14px;">قراءة الفصل 1 ⮕</a>
                </div>
                <img src="${cover}" class="manga-cover">
            `;
            list.prepend(card);
            document.getElementById('addMangaModal').style.display = 'none';
        }

        window.onload = () => {
            if(localStorage.getItem('role') === 'admin') {
                document.getElementById('adminBadge').style.display = 'block';
                document.getElementById('addMangaTrigger').style.display = 'block';
            }
        };
    </script>
</body>
</html>
