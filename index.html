<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igris Manga | الرئيسية المظلمة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* حافظت على جميع تنسيقاتك الأصلية كما هي تماماً */
        :root { 
            --p: #7d2ae8; --bg: #000000; --card: #0a0a0a; --side: #050505;       
            --text: #ffffff; --text-muted: #888888; --border: #151515;     
            --sub-bg: #111111; --glow: 0 0 20px rgba(125, 42, 232, 0.4); 
            --sidebar-width: 280px; --gradient: linear-gradient(135deg, #7d2ae8, #45128e);
            --red-accent: #ff0000; --red-glow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; overflow-x: hidden; min-height: 100vh; }
        header { background: rgba(0, 0, 0, 0.9); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--p); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px); }
        .logo { font-size: 1.7rem; font-weight: 900; text-decoration: none; letter-spacing: 1px; }
        .logo .red-part { color: var(--red-accent); text-shadow: var(--red-glow); }
        .logo .main-part { color: var(--p); text-shadow: var(--glow); }
        .search-bar { background: var(--card); border: 1px solid var(--border); padding: 10px 18px; border-radius: 30px; display: flex; align-items: center; gap: 10px; width: 220px; transition: 0.3s; }
        .search-bar:focus-within { border-color: var(--p); width: 260px; box-shadow: var(--glow); }
        .search-bar input { background: none; border: none; color: var(--text); outline: none; width: 100%; font-size: 0.9rem; font-family: 'Cairo'; }
        .sidebar { position: fixed; top: 0; right: calc(-1 * var(--sidebar-width)); width: var(--sidebar-width); height: 100%; background: var(--side); z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; box-shadow: -15px 0 40px rgba(0,0,0,0.8); border-left: 1px solid var(--border); }
        .sidebar.active { right: 0; }
        .user-profile-section { padding: 50px 20px; text-align: center; background: linear-gradient(to bottom, rgba(125, 42, 232, 0.1), transparent); }
        .user-avatar { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--p); margin: 0 auto 15px; overflow: hidden; box-shadow: var(--glow); display: flex; align-items: center; justify-content: center; background: var(--card); color: var(--p); font-size: 1.8rem; font-weight: 900; }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-name { font-weight: 900; font-size: 1.3rem; margin-bottom: 5px; color: #fff; }
        .profile-link { font-size: 0.85rem; color: var(--p); text-decoration: none; opacity: 0.8; }
        .nav-menu { flex: 1; overflow-y: auto; padding: 15px 10px; }
        .nav-link { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; color: #ccc; text-decoration: none; transition: 0.3s; cursor: pointer; border-radius: 12px; margin-bottom: 5px; }
        .nav-link.active-page { background: var(--gradient); color: white; box-shadow: var(--glow); }
        .nav-link:hover:not(.active-page) { background: rgba(125, 42, 232, 0.15); color: #fff; transform: translateX(-5px); }
        .link-content { display: flex; align-items: center; gap: 15px; }
        .dropdown-container { display: none; background: rgba(255,255,255,0.03); border-radius: 12px; margin: 5px; padding: 5px; }
        .dropdown-container.show { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1500; display: none; backdrop-filter: blur(10px); }
        .overlay.active { display: block; }
        .manga-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; padding: 30px 5%; }
        .manga-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: row-reverse; height: 180px; text-decoration: none; color: inherit; transition: 0.4s; }
        .manga-card:hover { border-color: var(--p); transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.6), var(--glow); }
        .manga-poster { width: 125px; min-width: 125px; height: 100%; position: relative; }
        .manga-poster img { width: 100%; height: 100%; object-fit: cover; }
        .manga-poster::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to right, var(--card), transparent); }
        .manga-info { padding: 15px; flex: 1; display: flex; flex-direction: column; justify-content: flex-start; gap: 10px; overflow: hidden; text-align: right; }
        .manga-title { font-size: 1.2rem; font-weight: 900; color: #fff; transition: 0.3s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .manga-card:hover .manga-title { color: var(--p); }
        .tag-item { background: #111; padding: 4px 12px; border-radius: 8px; font-size: 0.75rem; color: var(--p); border: 1px solid rgba(125, 42, 232, 0.3); font-weight: bold; }
        .ch-item { margin-top: auto; background: #000; padding: 10px 15px; border-radius: 12px; font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); transition: 0.3s; color: #fff; text-decoration: none; font-weight: bold; }
        .ch-item i { color: var(--p); font-size: 0.8rem; }
        .ch-item:hover { background: var(--p); border-color: var(--p); transform: scale(1.03); }
        #loading { text-align: center; padding: 100px; color: var(--p); }
        #menuBtn { cursor: pointer; font-size: 1.5rem; transition: 0.3s; color: #fff; }
        #menuBtn:hover { color: var(--p); transform: rotate(90deg); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--p); border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 20px;">
            <i class="fas fa-bars" id="menuBtn"></i>
            <a href="index.html" class="logo">
                <span class="red-part">IGRIS</span> <span class="main-part">MANGA</span>
            </a>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="ابحث عن مانجا...">
            <i class="fas fa-search" style="color:var(--p)"></i>
        </div>
    </header>

    <div class="overlay" id="overlay"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="user-profile-section">
            <div class="user-avatar" id="avatarBox">
                <img src="" id="userImg" alt="" style="display:none;">
                <span id="userInitials">?</span>
            </div>
            <div class="user-name" id="userName">زائر</div>
            <a href="profile.html" class="profile-link">إدارة الحساب</a>
        </div>

        <nav class="nav-menu">
            <a href="index.html" class="nav-link active-page">
                <div class="link-content"><i class="fas fa-home"></i> الصفحة الرئيسية</div>
            </a>
            <a href="hot.html" class="nav-link">
                <div class="link-content"><i class="fas fa-fire"></i> أعمال شائعة</div>
            </a>

            <div id="userListsSection" style="display: none;">
                <div class="nav-link" id="dropdownBtn">
                    <div class="link-content"><i class="fas fa-bookmark"></i> مكتبتي الخاصة</div>
                    <i class="fas fa-chevron-down" id="dropIcon" style="font-size: 0.7rem;"></i>
                </div>
                <div class="dropdown-container" id="dropdownMenu">
                    <a href="fav.html" class="nav-link"><div class="link-content"><i class="fas fa-heart"></i> المفضلة</div></a>
                    <a href="last.html" class="nav-link"><div class="link-content"><i class="fas fa-history"></i> تاريخ القراءة</div></a>
                    <a href="history.html" class="nav-link"><div class="link-content"><i class="fas fa-bell"></i> التنبيهات</div></a>
                </div>
            </div>

            <div id="adminDivider" style="border-top: 1px solid var(--border); margin: 15px 0; display: none;"></div>
            <a href="add-chapter.html" id="adminLink" class="nav-link" style="display: none;"><div class="link-content"><i class="fas fa-user-shield"></i> لوحة الإدارة</div></a>
        </nav>

        <div style="padding: 20px; text-align: center; color: var(--p); font-size: 0.8rem; font-weight: 900;">
            <i class="fas fa-moon"></i> IGRIS DARK SYSTEM
        </div>
    </div>

    <div id="loading">
        <i class="fas fa-spinner fa-pulse" style="font-size: 3.5rem;"></i>
    </div>

    <div class="manga-grid" id="mangaGrid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaosiZQoPCo4wdlSDy6UYs0b2PWbkkWXs",
            authDomain: "igrismanga-db.firebaseapp.com",
            databaseURL: "https://igrismanga-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "igrismanga-db",
            storageBucket: "igrismanga-db.appspot.com",
            appId: "1:40861137290:web:03cd9be7175620d4e23073"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        const admins = ["soran.ohshbah@gmail.com", "almsmmalmhtrf22@gmail.com"];

        onAuthStateChanged(auth, (user) => {
            const section = document.getElementById('userListsSection');
            const adminLink = document.getElementById('adminLink');
            const adminDivider = document.getElementById('adminDivider');
            const userNameEl = document.getElementById('userName');
            const userImg = document.getElementById('userImg');
            const userInitials = document.getElementById('userInitials');

            if (user) {
                section.style.display = 'block';
                userNameEl.innerText = user.displayName || "مستخدم";
                if(user.photoURL) {
                    userImg.src = user.photoURL; userImg.style.display = 'block'; userInitials.style.display = 'none';
                } else {
                    const name = user.displayName || user.email || "??";
                    userInitials.innerText = name.substring(0, 2).toUpperCase();
                    userImg.style.display = 'none'; userInitials.style.display = 'block';
                }
                
                if(admins.includes(user.email)) { 
                    adminLink.style.display = 'flex'; 
                    adminDivider.style.display = 'block'; 
                }
            } else {
                section.style.display = 'none'; adminLink.style.display = 'none'; adminDivider.style.display = 'none';
                userNameEl.innerText = "زائر"; userImg.style.display = 'none'; userInitials.innerText = "??";
            }
        });

        // تشغيل القوائم الجانبية
        document.getElementById('dropdownBtn').onclick = () => {
            document.getElementById('dropdownMenu').classList.toggle('show');
            document.getElementById('dropIcon').classList.toggle('fa-chevron-up');
        };

        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const toggleSidebar = () => { sidebar.classList.toggle('active'); overlay.classList.toggle('active'); };
        menuBtn.onclick = toggleSidebar;
        overlay.onclick = toggleSidebar;

        // جلب البيانات وعرضها
        onValue(ref(db, 'manga'), (snapshot) => {
            const grid = document.getElementById('mangaGrid');
            grid.innerHTML = '';
            document.getElementById('loading').style.display = 'none';
            if (snapshot.exists()) {
                const data = snapshot.val();
                Object.keys(data).forEach(id => {
                    const m = data[id];
                    let workType = m.type || "مانجا"; 
                    const workStatus = m.status || "مستمرة";
                    let chsDisplay = '<div class="ch-item">قريباً</div>';

                    if (m.chapters) {
                        const chapterKeys = Object.keys(m.chapters).map(Number).sort((a,b)=>b-a);
                        const latest = chapterKeys[0];
                        // تم التأكد من الربط بـ Viewer.html
                        chsDisplay = `<a href="Viewer.html?id=${id}&ch=${latest}" class="ch-item">
                                        <span>فصل ${latest}</span>
                                        <i class="fas fa-play"></i>
                                      </a>`;
                    }

                    grid.innerHTML += `
                        <div class="manga-card-wrapper">
                            <div class="manga-card">
                                <a href="reader.html?id=${id}" class="manga-poster">
                                    <img src="${m.cover}" loading="lazy">
                                </a>
                                <div class="manga-info">
                                    <a href="reader.html?id=${id}" style="text-decoration:none;"><div class="manga-title">${m.title}</div></a>
                                    <div class="manga-tags">
                                        <span class="tag-item">${workType}</span>
                                        <span class="tag-item">${workStatus}</span>
                                    </div>
                                    ${chsDisplay}
                                </div>
                            </div>
                        </div>`;
                });
            }
        });

        // نظام البحث
        document.getElementById('searchInput').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            document.querySelectorAll('.manga-card-wrapper').forEach(c => {
                const title = c.querySelector('.manga-title').innerText.toLowerCase();
                c.style.display = title.includes(val) ? 'block' : 'none';
            });
        };
    </script>
</body>
</html>
