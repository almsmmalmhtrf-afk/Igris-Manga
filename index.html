<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igris Manga | الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #7d2ae8; --bg: #050505; --card: #111; --glow: 0 0 20px rgba(125, 42, 232, 0.5); }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }

        /* الهيدر مع شريط البحث */
        header { 
            background: rgba(10, 10, 10, 0.9); 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--p);
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--p); text-shadow: var(--glow); text-decoration: none; }
        
        .search-container { position: relative; display: flex; align-items: center; }
        #searchInput { 
            background: #111; border: 1px solid #333; color: #fff; padding: 8px 15px; 
            border-radius: 20px; outline: none; font-family: 'Cairo'; width: 150px; transition: 0.3s;
        }
        #searchInput:focus { width: 220px; border-color: var(--p); }

        /* البانر العلوي */
        .hero-banner { 
            width: 100%; height: 350px; 
            background: linear-gradient(to top, var(--bg), transparent), url('manga1.jpg'); 
            background-size: cover; background-position: center;
            display: flex; align-items: flex-end; padding: 40px 5%; box-sizing: border-box;
        }

        /* حاوية المحتوى الرئيسي */
        .main-container { padding: 30px 5% 50px; }
        .section-header { border-right: 4px solid var(--p); padding-right: 12px; margin-bottom: 20px; }
        
        .manga-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; 
        }

        .manga-card { 
            background: var(--card); border-radius: 12px; overflow: hidden; 
            transition: 0.3s; border: 1px solid #1a1a1a; position: relative;
            text-decoration: none; color: #fff;
        }
        .manga-card:hover { transform: translateY(-5px); border-color: var(--p); box-shadow: var(--glow); }
        .manga-card img { width: 100%; height: 230px; object-fit: cover; }
        
        .badge { position: absolute; top: 8px; background: rgba(0,0,0,0.8); padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; border: 1px solid var(--p); }
        .badge.left { left: 8px; }
        .badge.right { right: 8px; background: var(--p); }

        .card-details { padding: 10px; }
        .card-details h3 { font-size: 0.9rem; margin: 0 0 5px; }
        .ch-info { color: var(--p); font-size: 0.8rem; font-weight: bold; }

        footer { text-align: center; padding: 40px; background: #080808; border-top: 1px solid #111; color: #333; font-size: 0.8rem; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">IGRIS MANGA</a>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="بحث عن مانهوا..." onkeyup="searchManga()">
        </div>
    </header>

    <div class="hero-banner"></div>

    <div class="main-container">
        <div class="section-header"><h3>آخر التحديثات ⚡</h3></div>
        
        <div class="manga-grid" id="mangaGrid">
            <a href="reader.html" class="manga-card" data-title="King of the Abyss">
                <span class="badge left">مستمرة</span>
                <span class="badge right">مانجا</span>
                <img src="manga1.jpg" alt="King of the Abyss">
                <div class="card-details">
                    <h3>King of the Abyss</h3>
                    <div class="ch-info">الفصل 1</div>
                </div>
            </a>
            
            <div class="manga-card" style="opacity:0.3;" data-title="قريباً">
                <img src="https://via.placeholder.com/160x230/111/444?text=Soon" alt="Soon">
                <div class="card-details"><h3>قريباً...</h3></div>
            </div>
        </div>
    </div>

    <footer>
        جميع الحقوق محفوظة لـ Igris Manga © 2026
    </footer>

    <script>
        // دالة البحث لتصفية الكروت بناءً على الاسم
        function searchManga() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('manga-card');
            
            for (let card of cards) {
                let title = card.getAttribute('data-title').toLowerCase();
                if (title.includes(input)) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
