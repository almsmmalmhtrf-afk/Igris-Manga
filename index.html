<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igris Manga | الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --p: #7d2ae8; --bg: #050505; --card: #111; --glow: 0 0 20px rgba(125, 42, 232, 0.3); 
            --side: #0a0a0a; --text: #fff; --border: #222; --sub-bg: #151515;
        }
        /* إصلاح محددات وضع النهار */
        body.light-mode { --bg: #f5f5f5; --card: #ffffff; --side: #ffffff; --text: #111; --border: #ddd; --sub-bg: #f0f0f0; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; overflow-x: hidden; transition: background 0.3s, color 0.3s; min-height: 100vh; }
        
        header { background: var(--side); padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--p); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--p); text-shadow: var(--glow); text-decoration: none; }
        
        /* لوحة التحكم العائمة للمدير */
        #adminFabContainer { position: fixed; bottom: 25px; left: 25px; z-index: 3000; display: none; flex-direction: column; gap: 10px; align-items: center; }
        .fab-main { width: 60px; height: 60px; background: var(--p); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; cursor: pointer; box-shadow: var(--glow); border: none; transition: 0.3s; z-index: 3001; }
        .fab-options { display: none; flex-direction: column; gap: 10px; margin-bottom: 5px; }
        .fab-options.active { display: flex; }
        .fab-btn { width: 50px; height: 50px; background: var(--card); border: 2px solid var(--p); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--p); cursor: pointer; transition: 0.3s; }

        /* نافذة الإضافة المنبثقة (Modal) */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 4000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); padding: 25px; border-radius: 15px; width: 90%; max-width: 450px; border: 1px solid var(--p); box-shadow: var(--glow); max-height: 90vh; overflow-y: auto; }
        .modal-content h3 { margin-top: 0; margin-bottom: 20px; font-weight: 900; color: var(--p); text-align: center;}
        .modal-content input, .modal-content textarea, .modal-content select { width: 100%; padding: 12px; margin-bottom: 12px; background: #000; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; outline: none; font-family: 'Cairo'; }
        .modal-content button { width: 100%; padding: 12px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; }

        /* نظام الحذف والشبكة */
        .manga-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px 5%; }
        .manga-card { position: relative; background: var(--card); border-radius: 12px; overflow: hidden; transition: 0.3s; border: 1px solid var(--border); display: flex; height: 185px; }
        .delete-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(239, 68, 68, 0.6); display: none; align-items: center; justify-content: center; z-index: 20; cursor: pointer; }
        body.delete-mode .delete-overlay { display: flex; }

        .manga-poster { width: 120px; height: 100%; min-width: 120px; cursor: pointer; }
        .manga-poster img { width: 100%; height: 100%; object-fit: cover; }
        .manga-info { padding: 15px; flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; }
        .manga-title { font-size: 1.1rem; font-weight: 700; margin: 0 0 5px 0; color: var(--p); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .manga-tags { display: flex; gap: 5px; margin-bottom: 8px; font-size: 0.7rem; }
        .tag-item { background: var(--sub-bg); padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border); color: #aaa; }
        .manga-desc-preview { font-size: 0.75rem; color: #777; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 10px; }
        .chapter-btn { margin-top: auto; background: var(--sub-bg); padding: 8px; border-radius: 6px; font-size: 0.8rem; text-decoration: none; color: var(--text); text-align: center; border: 1px solid var(--border); }

        /* القائمة الجانبية */
        .sidebar { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: var(--side); z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1500; display: none; backdrop-filter: blur(3px); }
        .overlay.active { display: block; }
        .side-links { padding: 15px 0; overflow-y: auto; flex-grow: 1; }
        .side-item { display: flex; align-items: center; padding: 12px 25px; color: var(--text); text-decoration: none; transition: 0.2s; font-size: 0.95rem; opacity: 0.8; justify-content: space-between; cursor: pointer; }
        .side-item i:first-child { margin-left: 15px; width: 20px; text-align: center; }
        .side-item:hover { background: rgba(125, 42, 232, 0.1); color: var(--p); opacity: 1; }
        .submenu { max-height: 0; overflow: hidden; background: var(--sub-bg); transition: max-height 0.3s ease-out; }
        .side-item.dropdown-active + .submenu { max-height: 400px; }
        .sub-item { display: flex; align-items: center; padding: 10px 45px; color: var(--text); text-decoration: none; font-size: 0.85rem; opacity: 0.7; }
    </style>
</head>
<body class="dark-mode">

    <header>
        <button onclick="toggleMenu()" style="background:none; border:none; color:var(--text); font-size:1.3rem; cursor:pointer;"><i class="fas fa-bars"></i></button>
        <a href="index.html" class="logo">IGRIS MANGA</a>
        <input type="text" id="searchInput" placeholder="بحث..." onkeyup="searchManga()" style="background:var(--card); border:1px solid var(--border); color:var(--text); padding:8px 15px; border-radius:20px; width:120px; outline:none;">
    </header>

    <div id="adminFabContainer">
        <div class="fab-options" id="fabOptions">
            <button class="fab-btn" onclick="openAddModal()" title="إضافة مانهوا"><i class="fas fa-plus"></i></button>
            <button class="fab-btn" onclick="toggleDeleteMode()" id="deleteToggleBtn" title="حذف مانهوا"><i class="fas fa-trash"></i></button>
        </div>
        <button class="fab-main" onclick="toggleFabMenu()"><i class="fas fa-user-shield"></i></button>
    </div>

    <div class="modal" id="addModal">
        <div class="modal-content">
            <h3>إضافة عمل جديد ✨</h3>
            <input type="text" id="newMangaId" placeholder="ID الرابط (مثال: solo-leveling)">
            <input type="text" id="newMangaTitle" placeholder="عنوان القصة">
            <input type="text" id="newMangaCover" placeholder="رابط صورة الغلاف">
            <input type="text" id="newMangaGenres" placeholder="التصنيفات (أكشن، سحر، نظام)">
            <div style="display:flex; gap:10px;">
                <select id="newMangaType">
                    <option value="مانهوا">مانهوا</option>
                    <option value="مانجا">مانجا</option>
                    <option value="مانها">مانها</option>
                </select>
                <select id="newMangaStatus">
                    <option value="مستمرة">مستمرة</option>
                    <option value="منتهية">منتهية</option>
                </select>
            </div>
            <textarea id="newMangaDesc" rows="3" placeholder="وصف قصير للقصة..."></textarea>
            <button onclick="confirmAddManga()">نشر القصة الآن 🚀</button>
            <button onclick="closeAddModal()" style="background:none; color:#666; border:none; margin-top:5px; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <div id="loggedOutUI" style="display:none; padding:40px 20px; text-align:center;">
             <a href="admin.html"><i class="fas fa-user-circle" style="font-size: 50px; color: var(--p);"></i></a>
             <p style="font-weight:bold; margin-top:15px;">يرجى تسجيل الدخول</p>
        </div>

        <div id="userProfile" style="display:none; padding:30px 20px; text-align:center; border-bottom:1px solid var(--border); background: linear-gradient(180deg, var(--border) 0%, var(--side) 100%);">
            <img id="userAvatar" src="" style="width:75px; height:75px; border-radius:50%; border:3px solid var(--p); object-fit:cover; margin-bottom:10px;">
            <h4 id="userName" style="margin:0; font-weight:900; font-size:1.1rem;"></h4>
            <p id="adminBadge" style="display:none; color:var(--p); font-size:0.75rem; font-weight:bold; margin:5px 0;"><i class="fas fa-crown"></i> مدير الموقع</p>
        </div>

        <nav class="side-links">
            <a href="index.html" class="side-item"><div><i class="fas fa-home"></i> الرئيسية</div></a>
            <div id="userListsContainer" style="display: none;">
                <div class="side-item" onclick="this.classList.toggle('dropdown-active')">
                    <div><i class="fas fa-list-ul"></i> قوائمي</div>
                    <i class="fas fa-chevron-down" style="font-size: 0.7rem;"></i>
                </div>
                <div class="submenu">
                    <a href="#" class="sub-item"><i class="fas fa-heart"></i> المفضلة</a>
                    <a href="#" class="sub-item"><i class="fas fa-history"></i> السجل</a>
                </div>
            </div>
            <div class="side-item" onclick="toggleDarkMode()">
                <div><i class="fas fa-moon"></i> الوضع الليلي</div>
                <div id="themeToggle" style="width:30px; height:15px; background:var(--p); border-radius:10px; transition: 0.3s;"></div>
            </div>
            <hr style="border:0; border-top:1px solid var(--border); margin:10px 20px;">
            <a href="#" onclick="handleLogout()" class="side-item" style="color:#ef4444;"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</a>
        </nav>
    </div>

    <div class="manga-grid" id="mangaGrid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDaosiZQoPCo4wdlSDy6UYs0b2PWbkkWXs",
          authDomain: "igrismanga-db.firebaseapp.com",
          databaseURL: "https://igrismanga-db-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "igrismanga-db",
          storageBucket: "igrismanga-db.appspot.com",
          appId: "1:40861137290:web:03cd9be7175620d4e23073"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const adminEmail = "almsmmalmhtrf22@gmail.com";

        onAuthStateChanged(auth, user => {
            const adminFab = document.getElementById('adminFabContainer');
            const profile = document.getElementById('userProfile');
            const logoutUI = document.getElementById('loggedOutUI');
            const badge = document.getElementById('adminBadge');
            const userLists = document.getElementById('userListsContainer');

            if (user) {
                logoutUI.style.display = 'none';
                profile.style.display = 'block';
                userLists.style.display = 'block';
                document.getElementById('userName').textContent = user.displayName || user.email.split('@')[0];
                document.getElementById('userAvatar').src = user.photoURL || "https://ui-avatars.com/api/?name=" + user.email;
                if (user.email === adminEmail) { adminFab.style.display = 'flex'; badge.style.display = 'block'; }
            } else {
                logoutUI.style.display = 'block'; profile.style.display = 'none'; adminFab.style.display = 'none'; userLists.style.display = 'none';
            }
        });

        onValue(ref(db, 'manga'), (snapshot) => {
            const grid = document.getElementById('mangaGrid');
            const data = snapshot.val();
            grid.innerHTML = '';
            if (data) {
                Object.keys(data).forEach(id => {
                    const m = data[id];
                    grid.innerHTML += `
                        <div class="manga-card" data-title="${m.title}">
                            <div class="delete-overlay" onclick="window.confirmDelete('${id}')"><i class="fas fa-trash-alt"></i></div>
                            <div class="manga-poster" onclick="location.href='reader.html?id=${id}'">
                                <img src="${m.cover}" onerror="this.src='https://via.placeholder.com/120x180'">
                            </div>
                            <div class="manga-info">
                                <h3 class="manga-title">${m.title}</h3>
                                <div class="manga-tags">
                                    <span class="tag-item">${m.type || 'مانهوا'}</span>
                                    <span class="tag-item" style="color:var(--p)">${m.status || 'مستمرة'}</span>
                                </div>
                                <p class="manga-desc-preview">${m.description || 'لا يوجد وصف...'}</p>
                                <a href="reader.html?id=${id}" class="chapter-btn">قراءة الآن</a>
                            </div>
                        </div>`;
                });
            }
        });

        window.confirmAddManga = async function() {
            const id = document.getElementById('newMangaId').value.trim();
            const title = document.getElementById('newMangaTitle').value;
            const cover = document.getElementById('newMangaCover').value;
            const type = document.getElementById('newMangaType').value;
            const status = document.getElementById('newMangaStatus').value;
            const desc = document.getElementById('newMangaDesc').value;
            const genresInput = document.getElementById('newMangaGenres').value;
            const genres = genresInput ? genresInput.split('،') : [];

            if(!id || !title) return alert("أكمل البيانات!");
            try {
                await set(ref(db, `manga/${id}`), { title, cover, type, status, description: desc, genres });
                alert("تم النشر!"); closeAddModal();
            } catch (e) { alert("حدث خطأ: " + e.message); }
        };

        window.confirmDelete = async function(id) {
            if(confirm("حذف العمل نهائياً؟")) await remove(ref(db, `manga/${id}`));
        };
        window.handleLogout = () => signOut(auth).then(() => location.reload());
    </script>

    <script>
        function toggleDarkMode() {
            const body = document.body;
            const themeToggle = document.getElementById('themeToggle');
            const isLight = body.classList.toggle('light-mode');
            
            if (isLight) {
                body.classList.remove('dark-mode');
                themeToggle.style.transform = 'translateX(-15px)';
                themeToggle.style.background = '#ccc';
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.add('dark-mode');
                themeToggle.style.transform = 'translateX(0)';
                themeToggle.style.background = 'var(--p)';
                localStorage.setItem('theme', 'dark');
            }
        }

        window.onload = () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                document.body.classList.remove('dark-mode');
                document.getElementById('themeToggle').style.transform = 'translateX(-15px)';
                document.getElementById('themeToggle').style.background = '#ccc';
            }
        };

        function toggleMenu() { 
            document.getElementById('sidebar').classList.toggle('active'); 
            document.getElementById('overlay').classList.toggle('active'); 
        }
        function toggleFabMenu() { document.getElementById('fabOptions').classList.toggle('active'); }
        function openAddModal() { document.getElementById('addModal').style.display = 'flex'; }
        function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }
        function toggleDeleteMode() { document.body.classList.toggle('delete-mode'); }
        
        function searchManga() {
            let term = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.manga-card').forEach(card => {
                const title = card.getAttribute('data-title') || "";
                card.style.display = title.toLowerCase().includes(term) ? "flex" : "none";
            });
        }
    </script>
</body>
</html>
