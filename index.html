<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igris Manga | الرئيسية المظلمة</title>

    <link rel="icon" type="image/png" href="https://i.postimg.cc/VLnqyNZX/logo-manga-igris.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/VLnqyNZX/logo-manga-igris.png">
    <link rel="icon" sizes="192x192" href="https://i.postimg.cc/VLnqyNZX/logo-manga-igris.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* المتخدمات العامة للألوان والهوية - تحديث لنظام سولو ليفلينج */
        :root { 
            --p: #00ceff; /* لون نظام سولو ليفلينج الأزرق النيوني */
            --bg: #000000;         
            --card: rgba(0, 20, 30, 0.85); /* شفافية تشبه نوافذ النظام */
            --side: #050505;       
            --text: #ffffff; 
            --text-muted: #888888;
            --border: #00ceff;     
            --sub-bg: #111111;
            --glow: 0 0 20px rgba(0, 206, 255, 0.3); 
            --sidebar-width: 280px;
            --gradient: linear-gradient(135deg, #00ceff, #007691);
            --red-accent: #ff0000;
            --red-glow: 0 0 15px rgba(255, 0, 0, 0.5);
            --p-light: #70e4ff;
            --penalty: #ff0000;
        }

        /* تنسيقات الصفحة الأساسية مع الخلفية الجديدة */
        body { 
            background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; min-height: 100vh;
            background-image: 
                linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)),
                url('https://i.pinimg.com/originals/f3/0e/4e/f30e4e60d845e0d293679809968a3c8a.jpg');
            background-size: cover;
            background-attachment: fixed;
        }

        /* نظام الرأس (Header) */
        header { 
            background: rgba(0, 0, 0, 0.9); padding: 15px 5%; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 2px solid var(--p); position: sticky; 
            top: 0; z-index: 1000; backdrop-filter: blur(15px);
            box-shadow: 0 5px 20px rgba(0, 206, 255, 0.1);
        }

        /* تصميم اللوجو المحدث ونظام التحريك */
        .logo { 
            font-size: 1.5rem; 
            font-weight: 900; 
            color: var(--p); 
            text-decoration: none; 
            letter-spacing: 2px; 
            font-family: 'Cairo', sans-serif;
            animation: pulseGlow 2s infinite alternate; 
            white-space: nowrap; /* منع انقسام الاسم لسطرين */
        }

        .logo span { 
            color: #fff; 
            text-shadow: 0 0 10px var(--p); 
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 5px var(--p); }
            100% { text-shadow: 0 0 15px var(--p), 0 0 20px var(--p); }
        }

        /* تعديل زر دخول النظام - تصميم ميكانيكي مانهوا */
        .auth-trigger {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: grab;
            transition: transform 0.1s linear, box-shadow 0.3s, border-color 0.3s;
            padding: 5px 12px;
            border-radius: 4px;
            text-decoration: none;
            position: fixed;
            bottom: 110px; /* تم رفع الزر ليتجنب شريط الإعلانات السفلي */
            left: 20px;
            z-index: 9999;
            background: rgba(0, 206, 255, 0.1);
            border: 1px solid var(--p);
            border-left: 4px solid var(--p);
            backdrop-filter: blur(10px);
            box-shadow: inset 0 0 10px rgba(0, 206, 255, 0.2);
            user-select: none;
            touch-action: none;
            clip-path: polygon(0% 0%, 90% 0%, 100% 30%, 100% 100%, 0% 100%);
        }
        .auth-trigger:active { cursor: grabbing; transform: scale(0.95); }
        .auth-trigger span { 
            font-weight: 900; 
            font-size: 0.75rem; 
            color: var(--p); 
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(0, 206, 255, 0.5);
        }

        /* انيميشن التحذير عند محاولة الاختراق */
        @keyframes systemFlash {
            0% { border-color: var(--p); box-shadow: var(--glow); background: rgba(0, 206, 255, 0.1); }
            50% { border-color: var(--red-accent); box-shadow: var(--red-glow); background: rgba(255, 0, 0, 0.2); }
            100% { border-color: var(--p); box-shadow: var(--glow); background: rgba(0, 206, 255, 0.1); }
        }
        .system-warning { animation: systemFlash 0.5s ease-in-out; }

        .header-avatar {
            width: 25px; height: 25px; border-radius: 2px; border: 1px solid var(--p);
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.5); color: var(--p); font-size: 0.6rem; font-weight: 900;
        }
        .header-avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* نظام البحث المقلص لتوفير مساحة للوجو */
        .search-bar {
            background: rgba(0, 20, 30, 0.85); border: 1px solid var(--p); padding: 8px 14px;
            border-radius: 30px; display: flex; align-items: center; gap: 8px; width: 140px; /* تم تقليص العرض هنا */
            transition: 0.3s;
            box-shadow: inset 0 0 10px rgba(0, 206, 255, 0.1);
        }
        .search-bar:focus-within { border-color: var(--p); width: 180px; box-shadow: var(--glow); }
        .search-bar input { background: none; border: none; color: var(--text); outline: none; width: 100%; font-size: 0.85rem; font-family: 'Cairo'; }

        /* نظام شبكة البطاقات (Manga Grid) */
        .manga-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); 
            gap: 25px; padding: 40px 5%; 
        }
        
        .manga-card { 
            background: var(--card); border-radius: 5px; overflow: hidden; 
            border: 2px solid rgba(0, 206, 255, 0.2); display: flex; flex-direction: row-reverse;
            height: 180px; text-decoration: none; color: inherit; transition: 0.4s;
            backdrop-filter: blur(10px);
            clip-path: polygon(0 0, 100% 0, 100% 85%, 92% 100%, 0 100%);
        }
        
        .manga-card:hover { border-color: var(--p); transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.6), var(--glow); }
        
        .manga-poster { width: 125px; min-width: 125px; height: 100%; position: relative; border-left: 1px solid var(--p); }
        .manga-poster img { width: 100%; height: 100%; object-fit: cover; }
        .manga-poster::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to right, rgba(0, 20, 30, 0.9), transparent); }
        
        .manga-info { 
            padding: 15px; flex: 1; display: flex; flex-direction: column; 
            justify-content: flex-start; gap: 10px; overflow: hidden; text-align: right;
        }
        
        .manga-title { font-size: 1.2rem; font-weight: 900; color: #fff; transition: 0.3s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: 0 0 10px rgba(0, 206, 255, 0.2); }
        .manga-card:hover .manga-title { color: var(--p); }
        
        .tag-item { background: rgba(0, 20, 30, 0.8); padding: 4px 12px; border-radius: 4px; font-size: 0.75rem; color: var(--p); border: 1px solid var(--p); font-weight: bold; text-transform: uppercase; }
        
        /* نظام الفصول المباشرة */
        .ch-item { 
            margin-top: auto; background: rgba(0, 0, 0, 0.5); padding: 10px 15px; border-radius: 4px; 
            font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid rgba(0, 206, 255, 0.3); transition: 0.3s; color: #fff; text-decoration: none; font-weight: bold;
        }
        .ch-item i { color: var(--p); font-size: 0.8rem; }
        .ch-item:hover { background: rgba(0, 206, 255, 0.2); border-color: var(--p); transform: scale(1.03); box-shadow: 0 0 15px rgba(0, 206, 255, 0.2); }

        /* مؤشر التحميل وشريط التمرير */
        #loading { text-align: center; padding: 100px; color: var(--p); text-shadow: var(--glow); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--p); border-radius: 10px; }
    </style>
</head>
<body>

    <header id="siteHeader">
        <div style="display: flex; align-items: center; gap: 10px;">
            <a href="index.html" class="logo">
                IGRIS <span>MANGA</span>
            </a>
        </div>
        <div class="search-bar" id="searchArea">
            <input type="text" id="searchInput" placeholder="ابحث...">
            <i class="fas fa-search" style="color:var(--p)"></i>
        </div>
    </header>

    <a href="profile.html" class="auth-trigger" id="draggableAuth">
        <div class="header-avatar">
            <img src="" id="headerUserImg" alt="" style="display:none;">
            <span id="headerUserInitials">?</span>
        </div>
        <span>نظام الدخول</span>
    </a>

    <div id="loading">
        <i class="fas fa-spinner fa-pulse" style="font-size: 3.5rem;"></i>
    </div>

    <div class="manga-grid" id="mangaGrid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaosiZQoPCo4wdlSDy6UYs0b2PWbkkWXs",
            authDomain: "igrismanga-db.firebaseapp.com",
            databaseURL: "https://igrismanga-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "igrismanga-db",
            storageBucket: "igrismanga-db.appspot.com",
            appId: "1:40861137290:web:03cd9be7175620d4e23073"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        document.documentElement.setAttribute('data-theme', 'dark');

        onAuthStateChanged(auth, (user) => {
            const headerUserImg = document.getElementById('headerUserImg');
            const headerUserInitials = document.getElementById('headerUserInitials');
            if (user) {
                const initials = (user.displayName || user.email || "??").substring(0, 2).toUpperCase();
                if(user.photoURL) {
                    headerUserImg.src = user.photoURL; headerUserImg.style.display = 'block'; headerUserInitials.style.display = 'none';
                } else {
                    headerUserInitials.innerText = initials;
                    headerUserImg.style.display = 'none'; headerUserInitials.style.display = 'block';
                }
            } else {
                headerUserImg.style.display = 'none'; headerUserInitials.innerText = "؟";
            }
        });

        // --- منطق السحب المحسن مع الانتقال الاني والتحذير والحفظ المؤقت ---
        const dragItem = document.getElementById("draggableAuth");
        const siteHeader = document.getElementById("siteHeader");
        let active = false;
        let currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

        window.addEventListener('DOMContentLoaded', () => {
            const savedX = sessionStorage.getItem('dragX');
            const savedY = sessionStorage.getItem('dragY');
            if (savedX && savedY) {
                xOffset = parseFloat(savedX);
                yOffset = parseFloat(savedY);
                currentX = xOffset;
                currentY = yOffset;
                setTranslate(xOffset, yOffset, dragItem);
            }
        });

        const dragStart = (e) => {
            dragItem.style.transition = "none";
            if (e.type === "touchstart") {
                initialX = e.touches[0].clientX - xOffset;
                initialY = e.touches[0].clientY - yOffset;
            } else {
                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
            }
            if (e.target === dragItem || dragItem.contains(e.target)) active = true;
        };

        const dragEnd = () => {
            initialX = currentX; initialY = currentY;
            active = false;
            sessionStorage.setItem('dragX', currentX);
            sessionStorage.setItem('dragY', currentY);
            dragItem.style.transition = "all 0.3s cubic-bezier(0.4, 0, 0.2, 1)";
        };

        const resetToCenter = () => {
            dragItem.style.transition = "transform 0.6s cubic-bezier(0.19, 1, 0.22, 1)";
            
            const centerX = (window.innerWidth / 2) - 50;
            const centerY = -(window.innerHeight / 2) + 50;
            
            xOffset = centerX;
            yOffset = centerY;
            currentX = centerX;
            currentY = centerY;
            
            sessionStorage.setItem('dragX', currentX);
            sessionStorage.setItem('dragY', currentY);

            dragItem.classList.add('system-warning');
            setTranslate(centerX, centerY, dragItem);
            
            setTimeout(() => {
                dragItem.classList.remove('system-warning');
                if(!active) dragItem.style.transition = "all 0.3s cubic-bezier(0.4, 0, 0.2, 1)";
            }, 600);
        };

        const drag = (e) => {
            if (active) {
                e.preventDefault();
                let clientX = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
                let clientY = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;

                currentX = clientX - initialX;
                currentY = clientY - initialY;

                const rect = dragItem.getBoundingClientRect();
                const headerRect = siteHeader.getBoundingClientRect();

                const hitHeader = rect.top < headerRect.bottom + 5;
                const hitEdges = rect.left < 5 || rect.right > window.innerWidth - 5 || rect.bottom > window.innerHeight - 5;

                if (hitHeader || hitEdges) {
                    active = false;
                    resetToCenter();
                    return;
                }

                xOffset = currentX;
                yOffset = currentY;
                setTranslate(currentX, currentY, dragItem);
            }
        };

        const setTranslate = (xPos, yPos, el) => {
            el.style.transform = `translate3d(${xPos}px, ${yPos}px, 0)`;
        };

        window.addEventListener("touchstart", dragStart, { passive: false });
        window.addEventListener("touchend", dragEnd, { passive: false });
        window.addEventListener("touchmove", drag, { passive: false });
        window.addEventListener("mousedown", dragStart);
        window.addEventListener("mouseup", dragEnd);
        window.addEventListener("mousemove", drag);

        onValue(ref(db, 'manga'), (snapshot) => {
            const grid = document.getElementById('mangaGrid');
            const loading = document.getElementById('loading');
            grid.innerHTML = '';
            loading.style.display = 'none'; 
            if (snapshot.exists()) {
                const data = snapshot.val();
                Object.keys(data).forEach(id => {
                    const m = data[id];
                    let workType = m.type || "مانجا";
                    const workStatus = m.status || "مستمرة";
                    let chsDisplay = '<div class="ch-item">قريباً</div>';
                    if (m.chapters) {
                        const chapterKeys = Object.keys(m.chapters).map(Number).sort((a,b)=>b-a);
                        const latest = chapterKeys[0];
                        chsDisplay = `<a href="Viewer.html?id=${id}&ch=${latest}" class="ch-item"><span>فصل ${latest}</span><i class="fas fa-play"></i></a>`;
                    }
                    grid.innerHTML += `
                        <div class="manga-card-wrapper">
                            <div class="manga-card">
                                <a href="reader.html?id=${id}" class="manga-poster"><img src="${m.cover || 'https://via.placeholder.com/125x180?text=No+Cover'}"></a>
                                <div class="manga-info">
                                    <a href="reader.html?id=${id}" style="text-decoration:none;"><div class="manga-title">${m.title || 'بدون عنوان'}</div></a>
                                    <div class="manga-tags"><span class="tag-item">${workType}</span><span class="tag-item">${workStatus}</span></div>
                                    ${chsDisplay}
                                </div>
                            </div>
                        </div>`;
                });
            } else {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-muted);">لا توجد قصص متاحة حالياً.</div>';
            }
        }, (error) => {
            document.getElementById('loading').style.display = 'none';
        });

        document.getElementById('searchInput').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            document.querySelectorAll('.manga-card-wrapper').forEach(c => {
                const title = c.querySelector('.manga-title').innerText.toLowerCase();
                c.style.display = title.includes(val) ? 'block' : 'none';
            });
        };
    </script>

    <script type='text/javascript' src='//pl25946124.highrevenuenetwork.com/97/81/15/978115682498717830b534608c105553.js'></script>

</body>
</html>
