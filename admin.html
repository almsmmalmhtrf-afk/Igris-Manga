<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igris Manga | تسجيل</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #8b5cf6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        
        /* أزرار التواصل الاجتماعي */
        .social-auth { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; border-top: 1px solid #334155; pt: 20px; padding-top: 15px; }
        .social-btn { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: normal; font-size: 0.9rem; }
        .google { background: #db4437; }
        .facebook { background: #4267B2; }
        .twitter { background: #000000; } /* X */
        
        .divider { text-align: center; margin: 15px 0; font-size: 0.8rem; color: #94a3b8; }
        .toggle-link { text-align: center; margin-top: 15px; font-size: 0.85rem; color: #94a3b8; cursor: pointer; }
        .admin-box { background: rgba(139, 92, 246, 0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--primary); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="authBox">
        <h2 id="title">تسجيل الدخول</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="handleAuth()" id="btnAction">دخول</button>
        
        <div class="divider">أو عبر المنصات التالية</div>

        <div class="social-auth">
            <button class="social-btn google" onclick="socialLogin('google')">تسجيل عبر Google</button>
            <button class="social-btn facebook" onclick="socialLogin('facebook')">تسجيل عبر Facebook</button>
            <button class="social-btn twitter" onclick="socialLogin('twitter')">تسجيل عبر X</button>
        </div>

        <div class="toggle-link" id="toggleLink" onclick="toggleMode()">ليس لديك حساب؟ إنشاء حساب</div>
    </div>

    <div id="adminPanel" class="hidden">
        <h2>لوحة الإدارة 👑</h2>
        <div class="admin-box">
            <input type="text" id="mId" placeholder="ID المانجا (مثلاً: manga1)">
            <input type="text" id="mTitle" placeholder="اسم المانجا">
            <input type="text" id="mCover" placeholder="رابط الغلاف">
            <button onclick="uploadData()">🚀 رفع فوري</button>
        </div>
        <button style="background:#ef4444; margin-top:10px;" onclick="firebase.auth().signOut()">خروج</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDaosiZQoPCo4wdlSDy6UYs0b2PWbkkWXs", 
        authDomain: "igrismanga-db.firebaseapp.com",
        databaseURL: "https://igrismanga-db-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "igrismanga-db",
        storageBucket: "igrismanga-db.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const adminEmail = "almsmmalmhtrf22@gmail.com";
    let isLogin = true;

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('title').innerText = isLogin ? "تسجيل الدخول" : "حساب جديد";
        document.getElementById('btnAction').innerText = isLogin ? "دخول" : "تسجيل";
        document.getElementById('toggleLink').innerText = isLogin ? "ليس لديك حساب؟ إنشاء حساب" : "لديك حساب؟ دخول";
    }

    // الدخول التقليدي
    function handleAuth() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        if(isLogin) {
            firebase.auth().signInWithEmailAndPassword(e, p).catch(err => alert("بيانات غير صحيحة"));
        } else {
            firebase.auth().createUserWithEmailAndPassword(e, p).then(u => {
                db.ref('users/' + u.user.uid).set({ email: e, role: 'user' });
            }).catch(err => alert(err.message));
        }
    }

    // تسجيل الدخول الاجتماعي
    function socialLogin(providerName) {
        let provider;
        if(providerName === 'google') provider = new firebase.auth.GoogleAuthProvider();
        if(providerName === 'facebook') provider = new firebase.auth.FacebookAuthProvider();
        if(providerName === 'twitter') provider = new firebase.auth.TwitterAuthProvider();

        firebase.auth().signInWithPopup(provider).then((result) => {
            const user = result.user;
            db.ref('users/' + user.uid).update({
                email: user.email,
                lastLogin: new Date().toISOString()
            });
        }).catch((error) => {
            alert("فشل تسجيل الدخول: " + error.message);
        });
    }

    firebase.auth().onAuthStateChanged(user => {
        const authBox = document.getElementById('authBox');
        const adminPanel = document.getElementById('adminPanel');
        
        if (user) {
            if (user.email === adminEmail) {
                authBox.classList.add('hidden');
                adminPanel.classList.remove('hidden');
            } else {
                window.location.href = "index.html"; 
            }
        } else {
            authBox.classList.remove('hidden');
            adminPanel.classList.add('hidden');
        }
    });

    function uploadData() {
        const id = document.getElementById('mId').value;
        const data = {
            title: document.getElementById('mTitle').value,
            cover: document.getElementById('mCover').value
        };
        db.ref('manga/' + id).set(data).then(() => {
            alert("تم الحفظ!");
            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    }
</script>
</body>
</html>
