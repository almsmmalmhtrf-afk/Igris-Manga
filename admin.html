<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igris Manga | تسجيل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #8b5cf6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; font-weight: 800; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(139, 92, 246, 0.2); }
        button { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 10px; font-family: 'Segoe UI'; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .social-auth { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; border-top: 1px solid #334155; padding-top: 15px; }
        .social-btn { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 500; font-size: 0.9rem; border: none; border-radius: 10px; color: white; cursor: pointer; padding: 12px; transition: 0.3s; }
        .google { background: #db4437; }
        .facebook { background: #1877f2; }
        .twitter { background: #000000; }
        
        .divider { text-align: center; margin: 15px 0; font-size: 0.8rem; color: #94a3b8; position: relative; }
        .toggle-link { text-align: center; margin-top: 15px; font-size: 0.85rem; color: #94a3b8; cursor: pointer; text-decoration: underline; }
        .toggle-link:hover { color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div id="authBox">
        <h2 id="title">تسجيل الدخول</h2>
        <form onsubmit="event.preventDefault(); handleAuth();">
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <input type="password" id="password" placeholder="كلمة المرور" required>
            <button type="submit" id="btnAction">دخول</button>
        </form>
        
        <div class="divider">أو عبر المنصات التالية</div>

        <div class="social-auth">
            <button class="social-btn google" onclick="socialLogin('google')" id="googleBtn">
                <i class="fab fa-google"></i> تسجيل عبر Google
            </button>
            <button class="social-btn facebook" onclick="socialLogin('facebook')">
                <i class="fab fa-facebook-f"></i> تسجيل عبر Facebook
            </button>
            <button class="social-btn twitter" onclick="socialLogin('twitter')">
                <i class="fab fa-x-twitter"></i> تسجيل عبر X
            </button>
        </div>

        <div class="toggle-link" id="toggleLink" onclick="toggleMode()">ليس لديك حساب؟ إنشاء حساب</div>
    </div>
</div>

<script>
    // الإعدادات المكتملة بناءً على بيانات مشروعك
    const firebaseConfig = {
        apiKey: "AIzaSyDaosiZQoPCo4wdlSDy6UYs0b2PWbkkWXs", 
        authDomain: "igrismanga-db.firebaseapp.com",
        databaseURL: "https://igrismanga-db-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "igrismanga-db",
        storageBucket: "igrismanga-db.appspot.com",
        messagingSenderId: "40861137290",
        appId: "1:40861137290:web:03cd9be7175620d4e23073"
    };

    // منع إعادة التهيئة إذا كان التطبيق مفعلاً مسبقاً
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    
    const db = firebase.database();
    const auth = firebase.auth();
    const adminEmail = "almsmmalmhtrf22@gmail.com";
    let isLogin = true;

    // تحديد كيفية حفظ الجلسة (تبقى مسجلاً حتى لو أغلقت المتصفح)
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('title').innerText = isLogin ? "تسجيل الدخول" : "حساب جديد";
        document.getElementById('btnAction').innerText = isLogin ? "دخول" : "تسجيل";
        document.getElementById('toggleLink').innerText = isLogin ? "ليس لديك حساب؟ إنشاء حساب" : "لديك حساب؟ دخول";
    }

    async function handleAuth() {
        const e = document.getElementById('email').value.trim();
        const p = document.getElementById('password').value;
        const btn = document.getElementById('btnAction');
        
        if(!e || !p) return alert("يرجى ملء كافة الحقول");
        
        btn.disabled = true;
        btn.innerText = "جاري المعالجة...";

        try {
            if(isLogin) {
                await auth.signInWithEmailAndPassword(e, p);
            } else {
                const userCredential = await auth.createUserWithEmailAndPassword(e, p);
                await db.ref('users/' + userCredential.user.uid).set({ 
                    email: e, 
                    role: 'user',
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });
            }
        } catch (err) {
            alert("خطأ: " + translateError(err.code));
            btn.disabled = false;
            btn.innerText = isLogin ? "دخول" : "تسجيل";
        }
    }

    function socialLogin(providerName) {
        let provider;
        if(providerName === 'google') provider = new firebase.auth.GoogleAuthProvider();
        else if(providerName === 'facebook') provider = new firebase.auth.FacebookAuthProvider();
        else if(providerName === 'twitter') provider = new firebase.auth.TwitterAuthProvider();

        const btn = document.getElementById('googleBtn');
        btn.disabled = true;

        auth.signInWithPopup(provider).then((result) => {
            return db.ref('users/' + result.user.uid).update({
                email: result.user.email,
                lastLogin: firebase.database.ServerValue.TIMESTAMP
            });
        }).catch((error) => {
            btn.disabled = false;
            if (error.code === 'auth/popup-blocked') {
                alert("يرجى السماح بالنوافذ المنبثقة في متصفح أوبرا لإتمام تسجيل الدخول.");
            } else {
                alert("فشل تسجيل الدخول: " + translateError(error.code));
            }
        });
    }

    // مترجم أخطاء بسيط لتحسين تجربة المستخدم
    function translateError(code) {
        switch (code) {
            case 'auth/user-not-found': return "المستخدم غير موجود";
            case 'auth/wrong-password': return "كلمة المرور خاطئة";
            case 'auth/email-already-in-use': return "البريد الإلكتروني مستخدم بالفعل";
            case 'auth/invalid-email': return "صيغة البريد غير صحيحة";
            case 'auth/weak-password': return "كلمة المرور ضعيفة جداً";
            default: return "حدث خطأ غير متوقع، حاول ثانية";
        }
    }

    // مراقبة حالة المستخدم وتوجيهه
    auth.onAuthStateChanged(user => {
        if (user) {
            localStorage.setItem('isAdmin', user.email === adminEmail ? 'true' : 'false');
            // التأكد من عدم التوجيه إذا كنا بالفعل في الصفحة الرئيسية لمنع التعليق
            if (!window.location.href.includes("index.html")) {
                window.location.replace("index.html"); 
            }
        }
    });
</script>
</body>
</html>
