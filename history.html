<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igris Manga | مركز الإشعارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --p: #00ceff; /* لون نظام سولو ليفلينج الأزرق النيوني */
            --bg: #000; 
            --card: rgba(0, 20, 30, 0.85); /* شفافية نوافذ النظام */
            --text: #fff; 
            --border: #00ceff; 
            --sub-bg: rgba(0, 40, 60, 0.5);
            --glow: 0 0 20px rgba(0, 206, 255, 0.3);
            --p-light: #70e4ff;
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; 
            margin: 0; padding: 0; transition: background 0.3s, color 0.3s; min-height: 100vh;
            background-image: 
                linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)),
                url('https://i.pinimg.com/originals/f3/0e/4e/f30e4e60d845e0d293679809968a3c8a.jpg');
            background-size: cover;
            background-attachment: fixed;
        }

        header { 
            background: var(--card); padding: 15px 5%; display: flex; 
            justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--p); position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(10px);
            box-shadow: var(--glow);
        }

        .logo { font-size: 1.5rem; font-weight: 900; color: var(--p); text-decoration: none; text-shadow: var(--glow); letter-spacing: 2px; }

        .container { 
            max-width: 800px; margin: 30px auto; padding: 40px 20px; 
            background: var(--card); border: 1px solid var(--p);
            backdrop-filter: blur(15px);
            clip-path: polygon(0 2%, 2% 0, 98% 0, 100% 2%, 100% 98%, 98% 100%, 2% 100%, 0 98%);
            box-shadow: inset 0 0 15px rgba(0,206,255,0.1);
        }

        .back-btn { 
            display: inline-flex; align-items: center; gap: 8px; 
            color: var(--p); text-decoration: none; margin-bottom: 20px; 
            font-size: 0.9rem; font-weight: 700; transition: 0.3s;
        }
        .back-btn:hover { text-shadow: 0 0 10px var(--p); transform: translateX(-5px); }

        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; border-right: 4px solid var(--p); padding-right: 15px;
        }

        .page-header h2 { font-weight: 900; letter-spacing: 1px; color: var(--text); }

        .notification-list { display: flex; flex-direction: column; gap: 15px; }

        .notif-item {
            background: rgba(0, 30, 45, 0.6); border: 1px solid rgba(0, 206, 255, 0.3);
            border-radius: 0; padding: 15px; display: flex; align-items: flex-start;
            gap: 15px; transition: 0.3s; position: relative; text-decoration: none; color: inherit;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 97% 100%, 0 100%);
        }

        .notif-item:hover { 
            border-color: var(--p); 
            background: rgba(0, 206, 255, 0.1); 
            transform: scale(1.01);
            box-shadow: var(--glow);
        }

        .notif-avatar { 
            width: 50px; height: 50px; border-radius: 5px; 
            object-fit: cover; border: 2px solid var(--p); flex-shrink: 0; 
            filter: contrast(1.1) brightness(0.9) hue-rotate(180deg);
        }
        
        .notif-icon-box { 
            width: 50px; height: 50px; border-radius: 5px; background: var(--sub-bg);
            display: flex; align-items: center; justify-content: center; 
            color: var(--p); font-size: 1.2rem; flex-shrink: 0;
            border: 1px solid var(--p);
        }

        .notif-content { flex: 1; min-width: 0; }
        .notif-user { font-weight: 900; color: var(--p); font-size: 1rem; text-shadow: 0 0 5px rgba(0,206,255,0.3); }
        .notif-text { font-size: 0.9rem; margin: 5px 0; opacity: 0.9; line-height: 1.4; color: #eee; }
        .notif-meta { font-size: 0.75rem; color: var(--p-light); opacity: 0.6; display: flex; align-items: center; gap: 10px; margin-top: 5px; }

        .notif-badge {
            background: var(--p); color: #000; padding: 2px 8px; border-radius: 2px; 
            font-size: 0.7rem; display: inline-block; font-weight: 900;
        }

        .comment-preview {
            background: rgba(0,0,0,0.4); padding: 10px; border-radius: 0; 
            margin-top: 8px; font-size: 0.85rem; border-right: 3px solid var(--p); 
            font-style: italic; color: #bbb;
        }

        #emptyState { text-align: center; padding: 80px 20px; display: none; }
        #emptyState h3 { color: var(--p); font-weight: 900; }

        #loading { text-align: center; padding: 50px; color: var(--p); }
        .fa-spin { text-shadow: var(--glow); }

        .clear-all { 
            color: #ff0055; background: rgba(255,0,85,0.1); 
            border: 1px solid #ff0055; cursor: pointer; 
            font-family: 'Cairo'; font-size: 0.85rem; padding: 5px 15px;
            transition: 0.3s; font-weight: 700;
        }
        .clear-all:hover { background: #ff0055; color: #fff; box-shadow: 0 0 15px #ff0055; }

        /* تأثيرات إضافية للنظام */
        .system-border {
            position: relative;
            margin-top: 50px; /* مساحة كافية لتجنب الهيدر */
        }
        .system-border::before {
            content: "SYSTEM LOG";
            position: absolute;
            top: 2px; right: 40px; /* تعديل الموضع ليكون داخل مسار الـ clip-path */
            background: var(--p);
            color: #000;
            font-size: 10px;
            font-weight: 900;
            padding: 2px 12px;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 15% 100%);
            z-index: 10;
        }
    </style>
</head>
<body>

    <header>
        <a href="i.html" class="logo">IGRIS MANGA</a>
        <a href="i.html" style="color: var(--p); font-size: 1.2rem; text-shadow: var(--glow);"><i class="fas fa-home"></i></a>
    </header>

    <div class="container system-border">
        <a href="i.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة إلى الرئيسية</a>

        <div class="page-header">
            <h2 style="margin: 0;">مركز الإشعارات</h2>
            <button class="clear-all" id="clearAllBtn"><i class="fas fa-trash"></i> مسح سجل الإشعارات</button>
        </div>

        <div id="loading"><i class="fas fa-circle-notch fa-spin" style="font-size: 2.5rem;"></i></div>

        <div id="emptyState">
            <i class="fas fa-bell-slash" style="font-size: 3rem; color: var(--sub-bg); margin-bottom: 15px;"></i>
            <h3>لا توجد إشعارات في السجل</h3>
            <p style="opacity:0.7">انتظر حتى يرسل النظام تحديثات المهام أو تفاعلات الظلال.</p>
        </div>

        <div class="notification-list" id="notifList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaosiZQoPCo4wdlSDy6UYs0b2PWbkkWXs",
            authDomain: "igrismanga-db.firebaseapp.com",
            databaseURL: "https://igrismanga-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "igrismanga-db",
            storageBucket: "igrismanga-db.appspot.com",
            appId: "1:40861137290:web:03cd9be7175620d4e23073"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // --- إصلاح نظام الثيم (الوضع الليلي والنهاري) ---
        const applyTheme = () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        };
        applyTheme();

        onAuthStateChanged(auth, (user) => {
            const list = document.getElementById('notifList');
            const loading = document.getElementById('loading');
            const empty = document.getElementById('emptyState');

            if (user) {
                const notifRef = ref(db, `users/${user.uid}/notifications`);
                
                onValue(notifRef, (snapshot) => {
                    list.innerHTML = '';
                    loading.style.display = 'none';

                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        // تحويل وتحقق من التوقيت لتجنب الأخطاء
                        const sortedNotifs = Object.keys(data).map(key => ({ 
                            id: key, 
                            ...data[key] 
                        })).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

                        let hasVisibleNotif = false;
                        sortedNotifs.forEach(notif => {
                            if (["like", "reply", "update_fav", "update_reading"].includes(notif.type)) {
                                list.appendChild(createNotifElement(notif));
                                hasVisibleNotif = true;
                            }
                        });

                        empty.style.display = hasVisibleNotif ? 'none' : 'block';
                    } else {
                        empty.style.display = 'block';
                    }
                });

                document.getElementById('clearAllBtn').onclick = () => {
                    if(confirm("هل أنت متأكد من مسح جميع سجلات الإشعارات من النظام؟")) {
                        remove(ref(db, `users/${user.uid}/notifications`));
                    }
                };
            } else {
                loading.innerHTML = '<p style="color:var(--p)">يرجى الدخول إلى البوابة أولاً</p>';
            }
        });

        function createNotifElement(n) {
            const item = document.createElement('a');
            item.className = 'notif-item';
            item.href = n.link || '#';

            let iconHtml = '';
            let contentHtml = '';

            if (n.type === 'like' || n.type === 'reply') {
                const imgSource = n.senderImg || 'https://via.placeholder.com/50';
                iconHtml = `<img src="${imgSource}" class="notif-avatar" onerror="this.src='https://ui-avatars.com/api/?name=${n.senderName}&background=00ceff&color=000'">`;
                contentHtml = `
                    <div class="notif-user">${n.senderName || 'صياد مجهول'}</div>
                    <div class="notif-text">
                        ${n.type === 'like' ? 'قام بالإعجاب بمهارتك (تعليقك)' : 'أرسل رداً على استدعائك'}:
                        <div class="comment-preview">"${n.commentText || '...'}"</div>
                    </div>
                `;
            } else {
                const icon = n.type === 'update_fav' ? 'fa-bolt' : 'fa-scroll';
                iconHtml = `<div class="notif-icon-box"><i class="fas ${icon}"></i></div>`;
                contentHtml = `
                    <div class="notif-user">${n.mangaTitle || 'مهمة جديدة'}</div>
                    <div class="notif-text">
                        تحديث في السجلات: <span class="notif-badge">الفصل ${n.chapterNum || '?'}</span> جاهز للاستدعاء.
                    </div>
                `;
            }

            item.innerHTML = `
                ${iconHtml}
                <div class="notif-content">
                    ${contentHtml}
                    <div class="notif-meta">
                        <span><i class="far fa-clock"></i> توقيت النظام: ${timeAgo(n.timestamp)}</span>
                    </div>
                </div>
            `;
            return item;
        }

        function timeAgo(timestamp) {
            if (!timestamp) return 'غير معروف';
            const diff = Math.floor((new Date() - new Date(timestamp)) / 1000);
            if (diff < 60) return 'الآن';
            if (diff < 3600) return `منذ ${Math.floor(diff / 60)} دقيقة`;
            if (diff < 86400) return `منذ ${Math.floor(diff / 3600)} ساعة`;
            return `منذ ${Math.floor(diff / 86400)} يوم`;
        }
    </script>
</body>
</html>
