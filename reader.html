<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading - Igris</title>
    <style>
        body { background: #000; margin: 0; padding: 0; overflow-x: hidden; }
        .admin-badge { 
            position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.9);
            border: 2px solid #00ff00; color: #00ff00; padding: 8px 15px; border-radius: 30px;
            font-size: 13px; font-weight: bold; z-index: 9999; display: none;
        }
        .admin-badge .dot { display: inline-block; width: 10px; height: 10px; background: #ff0000; border-radius: 50%; margin-right: 8px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* نظام الويب تون: صور ملتصقة 100% */
        .reader-container { display: flex; flex-direction: column; width: 100%; align-items: center; background: #000; }
        .image-wrapper { position: relative; width: 100%; max-width: 800px; line-height: 0; font-size: 0; }
        img { width: 100%; height: auto; display: block; border: none; margin: 0; padding: 0; }

        /* العداد الذكي */
        .page-info {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 5px 15px; border-radius: 20px;
            font-size: 12px; font-family: sans-serif; opacity: 0; transition: 0.5s; pointer-events: none;
        }

        /* زر حذف المالك */
        .del-btn {
            display: none; position: absolute; top: 10px; right: 10px;
            background: rgba(255,0,0,0.7); color: white; border: none; width: 35px; height: 35px;
            border-radius: 50%; cursor: pointer; font-size: 18px; line-height: 1;
        }
    </style>
</head>
<body>

    <div id="adminBadge" class="admin-badge"><span class="dot"></span>وضع المالك قيد التفعيل</div>

    <div class="reader-container" id="container">
        <div class="image-wrapper" id="img-1">
            <button class="del-btn" onclick="deleteImg('img-1')">×</button>
            <img src="1.jpg" loading="lazy" onmouseenter="showTag(this)">
            <div class="page-info">الفصل 1 / صفحة 1</div>
        </div>

        <div class="image-wrapper" id="img-2">
            <button class="del-btn" onclick="deleteImg('img-2')">×</button>
            <img src="2.jpg" loading="lazy" onmouseenter="showTag(this)">
            <div class="page-info">الفصل 1 / صفحة 2</div>
        </div>
        
        </div>

    <script>
        if(localStorage.getItem('role') === 'admin') {
            document.getElementById('adminBadge').style.display = 'block';
            document.querySelectorAll('.del-btn').forEach(b => b.style.display = 'block');
        }

        // وظيفة إظهار العداد لـ 2 ثانية
        function showTag(img) {
            let tag = img.nextElementSibling;
            tag.style.opacity = "1";
            setTimeout(() => { tag.style.opacity = "0"; }, 2000);
        }

        // الحذف الميكانيكي: يخفي الصورة ولا يخرب ترتيب البقية
        function deleteImg(id) {
            if(confirm("حذف هذه الصورة من تسلسل الفصل؟")) {
                let target = document.getElementById(id);
                target.style.display = "none";
            }
        }

        // تفعيل العداد تلقائياً عند التمرير
        window.addEventListener('scroll', () => {
            document.querySelectorAll('img').forEach(img => {
                let rect = img.getBoundingClientRect();
                if(rect.top > 0 && rect.top < window.innerHeight / 2) {
                    showTag(img);
                }
            });
        });
    </script>
</body>
</html>
