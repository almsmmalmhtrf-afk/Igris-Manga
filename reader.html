<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Igris Manga | Ultra Dark Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000; --card-bg: #0a0a0a; --text: #ffffff; --text-muted: #888888;
            --p: #7d2ae8; --glow: 0 0 20px rgba(125, 42, 232, 0.4); --border: #1a1a1a; --nav-btn-bg: #111111;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; width: 100%; overflow-x: hidden; line-height: 1.6; }
        
        /* تأثير التحميل الشبحي (Skeleton Animation) */
        .skeleton { background: linear-gradient(90deg, #0a0a0a 25%, #151515 50%, #0a0a0a 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 8px; color: transparent !important; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .hero { position: relative; width: 100%; height: 45vh; display: flex; align-items: flex-end; overflow: hidden; background: var(--bg); }
        .hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: blur(30px) brightness(0.2); z-index: -1; transform: scale(1.1); transition: 1s ease; }
        .hero-grad { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 15%, transparent 100%); z-index: -1; }
        .top-nav { position: absolute; top: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .site-logo { color: var(--p); font-size: 1.1rem; font-weight: 900; text-shadow: var(--glow); text-decoration: none; }
        .back-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--nav-btn-bg); border-radius: 50%; color: #fff !important; text-decoration: none; border: 1px solid var(--border); }
        .header-content { display: flex; flex-direction: row-reverse; gap: 15px; width: 100%; padding: 0 20px 20px; align-items: flex-end; z-index: 5; }
        .poster { width: 130px; flex-shrink: 0; }
        .poster img { width: 100%; border-radius: 12px; border: 2px solid var(--p); box-shadow: var(--glow); aspect-ratio: 2/3; object-fit: cover; opacity: 0; transition: 0.5s; }
        .poster img.loaded { opacity: 1; }

        .info { flex: 1; text-align: right; }
        .info h1 { font-size: 1.4rem; font-weight: 900; margin: 0 0 10px; color: #fff; }
        .interaction-bar { display: flex; align-items: center; gap: 8px; justify-content: flex-end; margin-bottom: 10px; }
        .stat-capsule { background: var(--card-bg); padding: 5px 12px; border-radius: 50px; border: 1px solid var(--border); display: flex; align-items: center; gap: 6px; font-size: 0.85rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .star-rating i { color: #333; font-size: 0.75rem; cursor: pointer; transition: 0.2s; }
        .star-rating i.active { color: #ffcc00 !important; text-shadow: 0 0 8px rgba(255, 204, 0, 0.5); }
        .heart-btn { color: #444; transition: 0.3s; pointer-events: none; }
        .heart-btn.active { color: #ff4757 !important; text-shadow: 0 0 10px rgba(255, 71, 87, 0.5); }
        .tags-list { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; justify-content: flex-end; }
        .tag { background: rgba(125, 42, 232, 0.15); color: var(--p); padding: 3px 10px; border-radius: 6px; border: 1px solid var(--p); font-size: 0.75rem; font-weight: 800; }
        .desc-box { padding: 18px; font-size: 0.95rem; color: var(--text-muted); text-align: right; margin: 15px 20px; border-right: 4px solid var(--p); background: var(--card-bg); border-radius: 4px; min-height: 50px; }
        .btn-full { width: calc(100% - 40px); margin: 10px 20px 25px; padding: 16px; border-radius: 12px; border: none; font-family: 'Cairo'; font-weight: 900; font-size: 1.1rem; cursor: pointer; background: var(--p); color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: var(--glow); transition: 0.3s; }
        .section-label { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--border); background: var(--card-bg); }
        .section-label h2 { font-size: 1.1rem; margin: 0; font-weight: 900; color: var(--p); }
        .sort-trigger { width: 38px; height: 38px; border-radius: 10px; background: #111; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--p); }
        .chapter-list { width: 100%; padding-bottom: 30px; }
        .chapter-link { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--border); text-decoration: none; color: inherit; background: var(--bg); transition: 0.2s; }
        .ch-info { display: flex; align-items: center; gap: 12px; flex-direction: row-reverse; }
        .ch-img-small { width: 45px; height: 65px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border); }
        .ch-meta { text-align: right; }
        .ch-n { font-weight: 900; font-size: 1.05rem; color: #fff; display: block; }
        .ch-d { font-size: 0.75rem; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="hero">
        <div id="mBg" class="hero-bg"></div>
        <div class="hero-grad"></div>
        <div class="top-nav">
            <a href="index.html" class="site-logo">IGRIS MANGA</a>
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
        </div>

        <div class="header-content">
            <div class="poster"><img src="" id="mCover" class="skeleton"></div>
            <div class="info">
                <h1 id="mTitle" class="skeleton">اسم القصة بانتظارك...</h1>
                <div class="interaction-bar">
                    <div class="stat-capsule" id="favBtn">
                        <span id="mFavs" class="skeleton">0</span>
                        <i class="fas fa-heart heart-btn" id="heartIcon"></i>
                    </div>
                    <div class="stat-capsule">
                        <span id="mRate" class="skeleton">0.0</span>
                        <div class="star-rating" id="starBox">
                            <i class="fas fa-star" data-v="1"></i>
                            <i class="fas fa-star" data-v="2"></i>
                            <i class="fas fa-star" data-v="3"></i>
                            <i class="fas fa-star" data-v="4"></i>
                            <i class="fas fa-star" data-v="5"></i>
                        </div>
                    </div>
                </div>
                <div class="meta-text" id="mTypeRow">النوع: <b id="mType" class="skeleton">--</b></div>
                <div class="meta-text" id="mStatusRow">الحالة: <b id="mStatus" class="skeleton">--</b></div>
                <div class="tags-list" id="mTags"></div>
            </div>
        </div>
    </div>

    <div class="desc-box skeleton" id="mDesc">...</div>

    <a href="#" id="readStartBtn" class="btn-full"><i class="fas fa-play-circle"></i> ابدأ القراءة الآن</a>

    <div class="section-label">
        <div class="sort-trigger" id="sortBtn"><i class="fas fa-sort-amount-down"></i></div>
        <h2>قائمة الفصول</h2>
    </div>

    <div id="mChapters" class="chapter-list">
        <div class="chapter-link skeleton" style="height: 80px; margin: 5px 0;"></div>
        <div class="chapter-link skeleton" style="height: 80px; margin: 5px 0;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaosiZQoPCo4wdlSDy6UYs0b2PWbkkWXs",
            authDomain: "igrismanga-db.firebaseapp.com",
            databaseURL: "https://igrismanga-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "igrismanga-db",
            storageBucket: "igrismanga-db.appspot.com",
            appId: "1:40861137290:web:03cd9be7175620d4e23073"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const mangaId = urlParams.get('id');

        let currentUser = null;
        let isLiked = false;
        let currentMangaData = null;
        let chaptersList = [];
        let isDesc = true;

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user && mangaId) {
                onValue(ref(db, `users/${user.uid}/favorites/${mangaId}`), (snap) => {
                    isLiked = snap.exists();
                    document.getElementById('heartIcon').classList.toggle('active', isLiked);
                });
            }
        });

        // نظام جلب البيانات مع إخفاء الـ Skeleton
        if (mangaId) {
            onValue(ref(db, `manga/${mangaId}`), (snapshot) => {
                if (snapshot.exists()) {
                    currentMangaData = snapshot.val();
                    renderMangaData(currentMangaData);
                } else {
                    window.location.href = 'index.html';
                }
            });
        }

        function renderMangaData(data) {
            // إزالة تأثير السكيلتون
            document.querySelectorAll('.skeleton').forEach(el => el.classList.remove('skeleton'));
            
            const coverImg = document.getElementById('mCover');
            coverImg.src = data.cover;
            coverImg.onload = () => coverImg.classList.add('loaded');
            
            document.getElementById('mBg').style.backgroundImage = `url('${data.cover}')`;
            document.getElementById('mTitle').innerText = data.title;
            document.getElementById('mDesc').innerText = data.description || "لا يوجد وصف حالياً.";
            document.getElementById('mType').innerText = data.type || "مانجا";
            document.getElementById('mStatus').innerText = data.status || "مستمرة";
            document.getElementById('mFavs').innerText = data.hearts || 0;
            document.getElementById('mRate').innerText = (data.rating || 0).toFixed(1);

            updateStarsDisplay(Math.round(data.rating || 0));

            const tagsBox = document.getElementById('mTags');
            tagsBox.innerHTML = '';
            if (data.genres) {
                data.genres.split(',').forEach(g => tagsBox.innerHTML += `<span class="tag">${g.trim()}</span>`);
            }

            if (data.chapters) {
                chaptersList = Object.keys(data.chapters).map(Number).sort((a,b) => b-a);
                renderChapters(chaptersList, data.cover);
                
                // حماية المسار: التأكد من وجود رقم الفصل قبل التوجيه
                const firstCh = Math.min(...chaptersList);
                document.getElementById('readStartBtn').href = `Viewer.html?id=${mangaId}&ch=${firstCh}`;
            } else {
                document.getElementById('mChapters').innerHTML = '<p style="text-align:center; padding:40px; color:#555;">قريباً...</p>';
            }
        }

        function renderChapters(chs, cover) {
            const container = document.getElementById('mChapters');
            container.innerHTML = chs.map(n => `
                <a href="Viewer.html?id=${mangaId}&ch=${n}" class="chapter-link">
                    <div class="ch-info">
                        <img src="${cover}" class="ch-img-small" loading="lazy">
                        <div class="ch-meta"><span class="ch-n">الفصل ${n}</span><span class="ch-d">متاح الآن</span></div>
                    </div>
                    <i class="fas fa-chevron-left" style="color:var(--p)"></i>
                </a>`).join('');
        }

        // 1. نظام التقييم الحقيقي (Real-time Rating System)
        document.querySelectorAll('#starBox i').forEach(star => {
            star.onclick = async () => {
                if (!currentUser) return alert("سجل دخولك لتقييم العمل");
                const val = parseInt(star.getAttribute('data-v'));
                
                const rateRef = ref(db, `manga/${mangaId}/ratings/${currentUser.uid}`);
                await set(rateRef, val);
                
                // تحديث متوسط التقييم العام (Transaction)
                const totalRateRef = ref(db, `manga/${mangaId}/rating`);
                const allRatingsRef = ref(db, `manga/${mangaId}/ratings`);
                onValue(allRatingsRef, (snap) => {
                    if (snap.exists()) {
                        const ratings = Object.values(snap.val());
                        const avg = ratings.reduce((a, b) => a + b, 0) / ratings.length;
                        set(totalRateRef, avg);
                    }
                }, { onlyOnce: true });
                
                updateStarsDisplay(val);
                alert("شكراً لتقييمك!");
            };
        });

        function updateStarsDisplay(v) {
            document.querySelectorAll('#starBox i').forEach(s => {
                s.classList.toggle('active', parseInt(s.dataset.v) <= v);
            });
        }

        // نظام المفضلة
        document.getElementById('favBtn').onclick = () => {
            if (!currentUser) return alert("سجل دخولك أولاً");
            const favRef = ref(db, `users/${currentUser.uid}/favorites/${mangaId}`);
            const countRef = ref(db, `manga/${mangaId}/hearts`);
            if (!isLiked) {
                set(favRef, { title: currentMangaData.title, cover: currentMangaData.cover, id: mangaId });
                runTransaction(countRef, (c) => (c || 0) + 1);
            } else {
                remove(favRef);
                runTransaction(countRef, (c) => Math.max(0, (c || 1) - 1));
            }
        };

        // الترتيب
        document.getElementById('sortBtn').onclick = () => {
            isDesc = !isDesc;
            document.querySelector('#sortBtn i').className = isDesc ? 'fas fa-sort-amount-down' : 'fas fa-sort-amount-up';
            renderChapters(isDesc ? [...chaptersList] : [...chaptersList].reverse(), currentMangaData.cover);
        };
    </script>
</body>
</html>
