<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igris Manga | تفاصيل العمل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --p: #7d2ae8; --bg: #050505; --card: #111; --glow: 0 0 20px rgba(125, 42, 232, 0.3); 
            --side: #0a0a0a; --text: #fff; --border: #222; --sub-bg: #151515;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        
        header { background: var(--side); padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--p); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--p); text-shadow: var(--glow); text-decoration: none; }

        .container { max-width: 1000px; margin: 20px auto; padding: 20px; }
        
        .manga-header { display: flex; gap: 30px; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); box-shadow: var(--glow); position: relative; overflow: hidden; }
        
        .poster-area { position: relative; z-index: 1; flex-shrink: 0; }
        .poster-area img { width: 220px; height: 320px; border-radius: 12px; object-fit: cover; border: 2px solid var(--p); box-shadow: var(--glow); }

        .info-area { position: relative; z-index: 1; flex-grow: 1; display: flex; flex-direction: column; }
        .manga-title { font-size: 2rem; font-weight: 900; margin: 0 0 15px 0; color: var(--p); }
        
        .meta-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .meta-item { background: var(--sub-bg); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--border); font-size: 0.9rem; }
        .meta-item span { color: var(--p); font-weight: bold; margin-left: 5px; }

        .genres { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .genre-tag { background: var(--p); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }

        .description { font-size: 1rem; color: #ccc; line-height: 1.8; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; border-right: 4px solid var(--p); }

        .action-btns { margin-top: 25px; display: flex; gap: 15px; }
        .btn { padding: 12px 30px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; font-family: 'Cairo'; text-decoration: none; }
        .btn-read { background: var(--p); color: white; box-shadow: var(--glow); }
        .btn-fav { background: #e91e63; color: white; }
        .btn:hover { transform: scale(1.05); opacity: 0.9; }

        @media (max-width: 768px) {
            .manga-header { flex-direction: column; align-items: center; text-align: center; }
            .meta-grid { grid-template-columns: 1fr; }
            .action-btns { justify-content: center; flex-wrap: wrap; }
            .poster-area img { width: 180px; height: 260px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">IGRIS MANGA</a>
        <a href="index.html" style="color:white; text-decoration:none;"><i class="fas fa-arrow-left"></i> العودة</a>
    </header>

    <div class="container">
        <div id="loading" style="text-align: center; padding: 50px;">
            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--p);"></i>
            <p>جاري تحميل البيانات...</p>
        </div>
        
        <div id="mangaContent" style="display: none;">
            <div class="manga-header">
                <div class="poster-area">
                    <img id="mangaCover" src="" alt="غلاف المانجا">
                </div>
                <div class="info-area">
                    <h1 class="manga-title" id="mangaTitle">اسم المانجا</h1>
                    
                    <div class="genres" id="mangaGenres"></div>

                    <div class="meta-grid">
                        <div class="meta-item"><span><i class="fas fa-layer-group"></i> النوع:</span> <span id="mangaType" style="color:white"></span></div>
                        <div class="meta-item"><span><i class="fas fa-info-circle"></i> الحالة:</span> <span id="mangaStatus" style="color:white"></span></div>
                    </div>

                    <div class="description" id="mangaDesc"></div>

                    <div class="action-btns">
                        <a href="#" id="startReadBtn" class="btn btn-read"><i class="fas fa-book-open"></i> قراءة أول فصل</a>
                        <button class="btn btn-fav"><i class="fas fa-heart"></i> المفضلة</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDaosiZQoPCo4wdlSDy6UYs0b2PWbkkWXs",
          authDomain: "igrismanga-db.firebaseapp.com",
          databaseURL: "https://igrismanga-db-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "igrismanga-db",
          storageBucket: "igrismanga-db.appspot.com",
          appId: "1:40861137290:web:03cd9be7175620d4e23073"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // منطق جلب المعرف وحفظه لمنع خطأ "لم يتم تحديد عمل"
        const urlParams = new URLSearchParams(window.location.search);
        let mangaId = urlParams.get('id');

        // إذا لم يوجد ID في الرابط، ابحث عنه في الذاكرة المؤقتة
        if (!mangaId) {
            mangaId = sessionStorage.getItem('lastMangaId');
        } else {
            // إذا وجد في الرابط، احفظه للاستخدام اللاحق
            sessionStorage.setItem('lastMangaId', mangaId);
        }

        if (mangaId) {
            const mangaRef = ref(db, `manga/${mangaId}`);
            get(mangaRef).then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    
                    document.title = `Igris Manga | ${data.title}`;
                    document.getElementById('mangaTitle').textContent = data.title;
                    document.getElementById('mangaCover').src = data.cover;
                    document.getElementById('mangaType').textContent = data.type || 'غير محدد';
                    document.getElementById('mangaStatus').textContent = data.status || 'مستمرة';
                    document.getElementById('mangaDesc').textContent = data.description || 'لا يوجد وصف متاح لهذا العمل حالياً.';
                    
                    document.getElementById('startReadBtn').href = `Viewer.html?id=${mangaId}`;
                    
                    const genresContainer = document.getElementById('mangaGenres');
                    if (data.genres) {
                        const genresList = Array.isArray(data.genres) ? data.genres : data.genres.split('،');
                        genresList.forEach(g => {
                            const span = document.createElement('span');
                            span.className = 'genre-tag';
                            span.textContent = g.trim();
                            genresContainer.appendChild(span);
                        });
                    }

                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('mangaContent').style.display = 'block';
                } else {
                    document.getElementById('loading').innerHTML = "خطأ: هذا العمل غير موجود في قاعدة البيانات.";
                }
            }).catch((error) => {
                console.error(error);
                document.getElementById('loading').innerHTML = "حدث خطأ في الاتصال بالخادم.";
            });
        } else {
            // توجيه تلقائي للرئيسية إذا لم يتم العثور على أي معرف نهائياً
            document.getElementById('loading').innerHTML = "جاري توجيهك للرئيسية...";
            setTimeout(() => { window.location.href = 'index.html'; }, 2000);
        }
    </script>
</body>
</html>
