<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>القارئ الذكي | Igris Manga</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; margin: 0; padding: 0; overflow-x: hidden; font-family: 'Cairo', sans-serif; }
        .v-header { position: fixed; top: 0; width: 100%; background: rgba(5, 5, 5, 0.95); border-bottom: 2px solid #7d2ae8; height: 70px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; padding: 0 5%; box-sizing: border-box; }
        .chapter-title { color: #fff; font-weight: 900; font-size: 1.1rem; }
        .nav-controls { display: flex; gap: 15px; align-items: center; }
        .nav-btn { background: #7d2ae8; color: #fff; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 1.2rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px rgba(125, 42, 232, 0.4); border: none; cursor: pointer; }
        .nav-btn:hover { background: #9d56f7; transform: scale(1.1); }
        .nav-btn.disabled { background: #222; color: #444; cursor: not-allowed; transform: none; box-shadow: none; }
        .v-container { width: 100vw; margin-top: 70px; line-height: 0; }
        .v-page { width: 100%; height: auto; display: block; margin: 0; padding: 0; border: none; }
    </style>
</head>
<body>

    <div class="v-header">
        <div class="nav-controls">
             <button id="nextBtn" class="nav-btn">»</button>
        </div>

        <span class="chapter-title" id="chapterDisplay">الفصل 1</span>

        <div class="nav-controls">
            <button id="prevBtn" class="nav-btn">«</button>
        </div>
    </div>

    <div class="v-container" id="engine"></div>

    <div style="padding: 100px 20px; text-align: center; background: #000; color: #444; direction: rtl;">
        <p id="endText" style="font-size: 1rem; color: #666; margin-bottom: 10px;">نهاية الفصل 1 - ملك الهاوية</p>
        <p style="font-size: 0.8rem; color: #222;">تطوير المبدع: Igris-Manga</p>
    </div>

    <script>
        // --- إعدادات النظام الذكي ---
        const totalChapters = 5; // عدّل هذا الرقم حسب عدد الفصول التي تملكها
        const imagesPerChapter = 26; // عدد الصور في كل فصل
        
        // جلب رقم الفصل الحالي من الرابط (مثلاً v.html?ch=1) أو البدء بـ 1
        let params = new URLSearchParams(window.location.search);
        let currentCh = parseInt(params.get('ch')) || 1;

        const engine = document.getElementById('engine');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        const chapterDisplay = document.getElementById('chapterDisplay');
        const endText = document.getElementById('endText');

        function loadChapter(ch) {
            // تحديث العناوين
            chapterDisplay.innerText = `الفصل ${ch}`;
            endText.innerText = `نهاية الفصل ${ch} - ملك الهاوية`;
            engine.innerHTML = ''; 

            // تحميل الصور (يفترض أن الصور في مجلدات ch1, ch2 أو مسميات واضحة)
            // هنا سنفترض أن الصور تتبع نظام: ch1_1.jpg, ch1_2.jpg وهكذا لعدم التداخل
            for (let i = 1; i <= imagesPerChapter; i++) {
                const img = document.createElement('img');
                img.src = `ch${ch}_${i}.jpg`; // نظام التسمية الجديد لمنع تداخل الصور
                img.className = 'v-page';
                img.loading = 'lazy';
                img.onerror = function() { this.style.display = 'none'; };
                engine.appendChild(img);
            }

            // التحكم في الأزرار
            // السهم التالي (يسار)
            if (ch >= totalChapters) {
                nextBtn.classList.add('disabled');
                nextBtn.onclick = null;
            } else {
                nextBtn.classList.remove('disabled');
                nextBtn.onclick = () => { window.location.href = `v.html?ch=${ch + 1}`; };
            }

            // السهم السابق (يمين)
            if (ch <= 1) {
                prevBtn.onclick = () => { window.location.href = 'r.html'; }; // يعود للقائمة إذا كان أول فصل
                prevBtn.innerText = '«'; 
            } else {
                prevBtn.classList.remove('disabled');
                prevBtn.onclick = () => { window.location.href = `v.html?ch=${ch - 1}`; };
            }
            
            window.scrollTo(0,0);
        }

        loadChapter(currentCh);
    </script>
</body>
</html>
<style>
    /* تنسيق أزرار التنقل السريع */
    .nav-footer-btns {
        max-width: 600px;
        margin: 40px auto;
        display: flex;
        flex-direction: column;
        gap: 15px;
        padding: 0 20px;
    }

    .nav-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 15px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: bold;
        font-family: 'Cairo', sans-serif;
        transition: 0.3s;
        border: 1px solid transparent;
    }

    /* زر القائمة (فخامة البنفسجي) */
    .btn-list {
        background: var(--p); /* اللون البنفسجي الموحد للموقع */
        color: #fff;
        box-shadow: 0 4px 15px rgba(125, 42, 232, 0.3);
    }
    .btn-list:hover {
        transform: scale(1.02);
        box-shadow: 0 6px 20px rgba(125, 42, 232, 0.5);
    }

    /* زر الرئيسية (الأسود العميق) */
    .btn-home {
        background: #111;
        color: #ccc;
        border-color: #333;
    }
    .btn-home:hover {
        border-color: var(--p);
        color: #fff;
        background: #000;
    }

    .nav-btn i {
        margin-left: 10px;
    }
</style>

<div class="nav-footer-btns">
    <a href="reader.html" class="nav-btn btn-list">
         قائمة الفصول ☰
    </a>
    
    <a href="index.html" class="nav-btn btn-home">
         الصفحة الرئيسية 🏠
    </a>
</div>
