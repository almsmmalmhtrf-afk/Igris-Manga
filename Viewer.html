<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>القارئ الذكي | Igris Manga</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #7d2ae8; } 

        body { background: #000; margin: 0; padding: 0; overflow-x: hidden; font-family: 'Cairo', sans-serif; }
        
        .v-header { position: fixed; top: 0; width: 100%; background: rgba(5, 5, 5, 0.95); border-bottom: 2px solid var(--p); height: 70px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; padding: 0 5%; box-sizing: border-box; }
        .chapter-title { color: #fff; font-weight: 900; font-size: 1.1rem; }
        
        .nav-controls { display: flex; gap: 15px; align-items: center; }
        .nav-btn-header { background: var(--p); color: #fff; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 1.2rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px rgba(125, 42, 232, 0.4); border: none; cursor: pointer; }
        .nav-btn-header:hover { background: #9d56f7; transform: scale(1.1); }
        
        /* الحالة المعطلة للسهمين (التالي والسابق) */
        .nav-btn-header.disabled { 
            background: #222 !important; 
            color: #555 !important; 
            cursor: not-allowed !important; 
            transform: none !important; 
            box-shadow: none !important; 
            filter: grayscale(100%);
        }

        .v-container { width: 100vw; margin-top: 70px; line-height: 0; }
        .v-page { width: 100%; height: auto; display: block; margin: 0; padding: 0; border: none; }

        .nav-footer-btns { max-width: 600px; margin: 40px auto; display: flex; flex-direction: column; gap: 15px; padding: 0 20px; }
        .footer-btn { display: flex; align-items: center; justify-content: center; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; transition: 0.3s; border: 1px solid transparent; }
        .btn-list { background: var(--p); color: #fff; box-shadow: 0 4px 15px rgba(125, 42, 232, 0.3); }
        .btn-home { background: #111; color: #ccc; border-color: #333; }
        .btn-home:hover { border-color: var(--p); color: #fff; background: #000; }
    </style>
</head>
<body>

    <div class="v-header">
        <div class="nav-controls">
             <button id="nextBtn" class="nav-btn-header">»</button>
        </div>

        <span class="chapter-title" id="chapterDisplay">جاري التحميل...</span>

        <div class="nav-controls">
            <button id="prevBtn" class="nav-btn-header">«</button>
        </div>
    </div>

    <div class="v-container" id="engine"></div>

    <div style="padding: 50px 20px; text-align: center; background: #000; color: #444;">
        <p id="endText" style="font-size: 1rem; color: #666; margin-bottom: 10px;"></p>
        
        <div class="nav-footer-btns">
            <a href="reader.html" class="footer-btn btn-list">قائمة الفصول ☰</a>
            <a href="index.html" class="footer-btn btn-home">الصفحة الرئيسية 🏠</a>
        </div>
        
        <p style="font-size: 0.8rem; color: #222; margin-top: 20px;">تطوير المبدع: Igris-Manga</p>
    </div>

    <script>
        // --- الإعدادات ---
        const totalChapters = 1; // إذا كانت القيمة 1، سيتعطل سهم "التالي" فوراً
        const imagesPerChapter = 26; 
        
        let params = new URLSearchParams(window.location.search);
        let currentCh = parseInt(params.get('ch')) || 1;

        const engine = document.getElementById('engine');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        const chapterDisplay = document.getElementById('chapterDisplay');
        const endText = document.getElementById('endText');

        function loadChapter(ch) {
            chapterDisplay.innerText = `الفصل ${ch}`;
            endText.innerText = `نهاية الفصل ${ch} - ملك الهاوية`;
            engine.innerHTML = ''; 

            for (let i = 1; i <= imagesPerChapter; i++) {
                const img = document.createElement('img');
                img.src = `ch${ch}_${i}.jpg`; 
                img.className = 'v-page';
                img.loading = 'lazy';
                img.onerror = function() { this.style.display = 'none'; };
                engine.appendChild(img);
            }

            // --- التعديل على سهم التالي (Next) ---
            if (ch >= totalChapters) {
                nextBtn.classList.add('disabled'); // تفعيل الشكل الرمادي
                nextBtn.onclick = (e) => {
                    e.preventDefault();
                    console.log("لا يوجد فصل تالي");
                }; 
            } else {
                nextBtn.classList.remove('disabled');
                nextBtn.onclick = () => { window.location.href = `Viewer.html?ch=${ch + 1}`; };
            }

            // --- التعديل على سهم السابق (Prev) ---
            if (ch <= 1) {
                prevBtn.classList.add('disabled'); 
                prevBtn.onclick = (e) => {
                    e.preventDefault();
                    console.log("أنت في الفصل الأول");
                }; 
            } else {
                prevBtn.classList.remove('disabled');
                prevBtn.onclick = () => { window.location.href = `Viewer.html?ch=${ch - 1}`; };
            }
            
            window.scrollTo(0,0);
        }

        loadChapter(currentCh);
    </script>
</body>
</html>
