<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>القارئ الذكي | Igris Manga</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --p: #00ceff; /* اللون الأزرق النيوني من ملف البروفايل */
            --bg: #000000; 
            --text: #ffffff; 
            --header-bg: rgba(0, 20, 30, 0.95); /* خلفية شفافة بنمط نظام سولو ليفلينج */
            --border: #00ceff;
            --modal-bg: rgba(0, 15, 25, 0.98);
            --danger: #ff0055;
            --warning: #ffcc00;
            --glow: 0 0 15px rgba(0, 206, 255, 0.4);
        } 

        body { 
            background: var(--bg); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
            font-family: 'Cairo', sans-serif; 
            color: var(--text);
            background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://i.pinimg.com/originals/f3/0e/4e/f30e4e60d845e0d293679809968a3c8a.jpg');
            background-attachment: fixed;
            background-size: cover;
        }
        
        body.fullscreen-mode .v-header, 
        body.fullscreen-mode .comments-container, 
        body.fullscreen-mode .v-footer { display: none !important; }
        body.fullscreen-mode .v-container { margin-top: 0 !important; }
        
        .floating-expand-btn {
            position: fixed; bottom: 20px; left: 20px; 
            width: 50px; height: 50px; background: rgba(0, 206, 255, 0.2);
            border-radius: 5px; display: flex; align-items: center; 
            justify-content: center; z-index: 10002; cursor: pointer;
            box-shadow: var(--glow); border: 1px solid var(--p); color: var(--p);
            backdrop-filter: blur(10px);
        }

        .igris-alert {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 15, 25, 0.95); border: 1px solid var(--p);
            backdrop-filter: blur(15px); color: #fff; padding: 15px 30px;
            border-radius: 0; z-index: 10001; font-weight: bold;
            box-shadow: var(--glow);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex; align-items: center; gap: 12px; min-width: 280px; justify-content: center;
            clip-path: polygon(0 0, 100% 0, 100% 75%, 90% 100%, 0 100%);
        }
        .igris-alert.show { top: 30px; }
        .igris-alert i { font-size: 1.3rem; color: var(--p); text-shadow: 0 0 10px var(--p); }

        .igris-confirm-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 11000;
            backdrop-filter: blur(10px);
        }
        .confirm-content {
            background: var(--modal-bg); border: 2px solid var(--p);
            padding: 30px; border-radius: 5px; text-align: center; width: 85%; max-width: 400px;
            box-shadow: var(--glow);
            clip-path: polygon(0 5%, 5% 0, 95% 0, 100% 5%, 100% 95%, 95% 100%, 5% 100%, 0 95%);
        }

        .v-header { 
            position: fixed; top: 0; width: 100%; background: var(--header-bg); 
            border-bottom: 2px solid var(--p); height: 70px; display: flex; 
            justify-content: space-between; align-items: center; z-index: 1000; 
            padding: 0 5%; box-sizing: border-box; backdrop-filter: blur(10px);
            box-shadow: var(--glow);
        }
        
        .chapter-title { color: var(--p); font-weight: 900; font-size: 1.1rem; text-shadow: 0 0 5px var(--p); }
        
        .nav-btn-header { 
            background: rgba(0, 206, 255, 0.1); color: var(--p); padding: 8px 18px; border-radius: 0; 
            text-decoration: none; font-weight: bold; font-size: 1.2rem; transition: 0.3s; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: none; border: 1px solid var(--p); cursor: pointer; 
        }
        .nav-btn-header:hover { background: var(--p); color: #000; }
        
        .nav-btn-header.disabled { 
            background: #111 !important; 
            color: #333 !important; 
            cursor: not-allowed !important; 
            box-shadow: none !important;
            opacity: 0.5;
            pointer-events: none;
            border-color: #333;
        }

        .v-container { width: 100vw; margin-top: 70px; line-height: 0; background: #000; }
        .v-page { width: 100%; height: auto; display: block; margin: 0; padding: 0; border: none; }

        .v-footer { padding: 60px 20px; text-align: center; color: #666; border-top: 1px solid rgba(0, 206, 255, 0.2); background: rgba(0, 10, 20, 0.9); }
        .footer-btn { display: flex; align-items: center; justify-content: center; padding: 16px; border-radius: 0; text-decoration: none; font-weight: bold; transition: 0.3s; margin: 10px auto; max-width: 400px; border: 1px solid var(--p); }
        .btn-list { background: rgba(0, 206, 255, 0.1); color: var(--p); }
        .btn-list:hover { background: var(--p); color: #000; }
        .btn-home { background: transparent; color: #fff; border: 1px solid #444; }
        .btn-report-issue { background: rgba(255, 0, 85, 0.1); color: #ff0055; border: 1px solid #ff0055; margin-bottom: 20px; cursor: pointer; }

        #loading { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; color: var(--p); }

        .comments-filter { display: flex; gap: 10px; margin-bottom: 20px; padding: 0 5%; }
        .filter-btn { background: rgba(0, 206, 255, 0.05); border: 1px solid rgba(0, 206, 255, 0.3); color: #fff; padding: 6px 15px; border-radius: 0; cursor: pointer; font-size: 0.8rem; transition: 0.3s; }
        .filter-btn.active { background: var(--p); color: #000; border-color: var(--p); }

        .comments-container { padding: 30px 5%; background: rgba(0, 5, 10, 0.9); color: #fff; text-align: right; border-top: 2px solid var(--p); }
        .comment-card { 
            background: rgba(0, 20, 30, 0.8); border: 1px solid rgba(0, 206, 255, 0.2); border-radius: 0; 
            padding: 20px; margin-bottom: 20px; position: relative;
            clip-path: polygon(0 0, 100% 0, 100% 95%, 98% 100%, 0 100%);
        }
        .comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 40px; height: 40px; background: rgba(0, 206, 255, 0.1); border: 1px solid var(--p); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--p); text-transform: uppercase; overflow: hidden; }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; filter: contrast(1.1) brightness(0.9) hue-rotate(180deg); }
        .user-name { font-weight: 900; color: var(--p); text-decoration: none; }
        .comment-date { font-size: 0.7rem; color: #555; margin-right: 10px; }

        .spoiler-tag { 
            background: #ff0055; color: #fff; font-size: 0.6rem; padding: 2px 8px; 
            border-radius: 0; margin-right: 10px; cursor: help;
        }
        .comment-text { line-height: 1.6; color: #ddd; word-wrap: break-word; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
        .comment-text.expanded { -webkit-line-clamp: unset; display: block; }
        .comment-text.is-spoiler { 
            filter: blur(8px); background: #111; color: transparent; 
            user-select: none; transition: 0.3s; cursor: pointer;
        }
        .comment-text.is-spoiler.revealed { 
            filter: blur(0); background: transparent; color: #ccc; user-select: text; 
        }

        .show-more-btn { color: var(--p); font-size: 0.8rem; cursor: pointer; display: none; margin-top: 5px; font-weight: bold; }

        .comment-actions { display: flex; gap: 15px; margin-top: 15px; align-items: center; border-top: 1px solid rgba(0, 206, 255, 0.1); padding-top: 10px; }
        .action-link { color: #555; font-size: 0.8rem; cursor: pointer; transition: 0.2s; text-decoration: none; display: flex; align-items: center; gap: 5px; }
        .action-link:hover { color: var(--p); }
        .action-link.like-btn.active { color: #ff0055; }
        .report-btn:hover { color: #ff0055 !important; }
        .like-count { font-size: 0.75rem; color: var(--p); font-weight: bold; }

        .replies-container { margin-right: 20px; border-right: 2px solid rgba(0, 206, 255, 0.2); padding-right: 15px; margin-top: 15px; }
        .reply-item { background: rgba(0, 10, 15, 0.5); border-radius: 0; padding: 12px; margin-bottom: 10px; border: 1px solid rgba(0, 206, 255, 0.1); }

        .input-group { background: rgba(0, 20, 30, 0.9); padding: 20px; border-radius: 0; border: 1px solid var(--p); margin-bottom: 30px; box-shadow: var(--glow); }
        .input-group textarea { 
            width: 100%; background: #000; border: 1px solid rgba(0, 206, 255, 0.3); color: var(--p); 
            padding: 12px; border-radius: 0; margin-bottom: 10px; font-family: 'Cairo'; outline: none; box-sizing: border-box; resize: none;
        }
        .options-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .spoiler-check { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #888; cursor: pointer; }
        .btn-submit { background: rgba(0, 206, 255, 0.2); color: var(--p); border: 1px solid var(--p); padding: 10px 25px; border-radius: 0; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { background: var(--p); color: #000; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 3000;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--modal-bg); width: 90%; max-width: 450px;
            border-radius: 0; border: 2px solid var(--p); overflow: hidden;
            position: relative; animation: modalSlide 0.3s ease-out;
            padding: 25px; box-sizing: border-box;
            box-shadow: var(--glow);
            clip-path: polygon(0 5%, 5% 0, 95% 0, 100% 5%, 100% 95%, 95% 100%, 5% 100%, 0 95%);
        }
        @keyframes modalSlide { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-close { position: absolute; top: 15px; left: 15px; color: #888; font-size: 1.5rem; cursor: pointer; }
        .modal-header { text-align: center; margin-bottom: 20px; }
        .modal-header i { font-size: 2.2rem; margin-bottom: 10px; display: block; color: var(--p); }
        .modal-header h2 { font-size: 1.2rem; margin: 0; font-weight: 900; color: var(--p); }
        .modal-header p { font-size: 0.85rem; color: #666; margin-top: 5px; }

        .report-target-box { background: rgba(0, 20, 30, 1); padding: 12px; border-radius: 0; margin-bottom: 20px; font-size: 0.85rem; border-right: 3px solid var(--p); }
        .report-target-box span { display: block; font-size: 0.75rem; color: #555; margin-bottom: 5px; }

        .form-label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: bold; color: var(--p); }
        .modal-textarea {
            width: 100%; background: #000; border: 1px solid rgba(0, 206, 255, 0.3); color: #fff;
            padding: 12px; border-radius: 0; font-family: 'Cairo'; outline: none;
            margin-bottom: 20px; box-sizing: border-box; resize: none; min-height: 80px;
        }

        .modal-actions { display: flex; flex-direction: column; gap: 10px; }
        .btn-report-send { background: rgba(255, 0, 85, 0.2); color: #ff0055; border: 1px solid #ff0055; padding: 12px; border-radius: 0; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-report-send:hover { background: #ff0055; color: #fff; }
        .btn-report-cancel { background: transparent; color: #888; border: 1px solid #222; padding: 12px; border-radius: 0; font-weight: bold; cursor: pointer; }

        .custom-select-wrapper { position: relative; margin-bottom: 20px; }
        .custom-select-trigger {
            background: #000; border: 1px solid rgba(0, 206, 255, 0.3); color: #fff;
            padding: 12px 15px; border-radius: 0; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.9rem; transition: 0.3s;
        }
        .custom-options {
            position: absolute; top: 110%; left: 0; right: 0;
            background: #0a0a0a; border: 1px solid var(--p);
            border-radius: 0; z-index: 10; display: none;
            max-height: 200px; overflow-y: auto;
            box-shadow: var(--glow);
        }
        .custom-options.open { display: block; animation: fadeIn 0.2s ease; }
        .custom-option {
            padding: 12px 15px; cursor: pointer; font-size: 0.85rem;
            transition: 0.2s; border-bottom: 1px solid #151515;
        }
        .custom-option:hover { background: var(--p); color: #000; }
        .custom-option.selected { color: var(--p); font-weight: bold; background: rgba(0, 206, 255, 0.1); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body> 
    <div id="loading"><i class="fas fa-spinner fa-spin" style="font-size: 3rem;"></i></div>

    <button id="toggleFullscreen" class="floating-expand-btn">
        <i class="fas fa-expand"></i>
    </button>

    <div id="igrisAlert" class="igris-alert">
        <i class="fas fa-bolt"></i>
        <span id="igrisAlertMsg"></span>
    </div>

    <div id="confirmModal" class="igris-confirm-modal">
        <div class="confirm-content">
            <i class="fas fa-trash-alt" style="color: var(--danger); font-size: 2rem; margin-bottom: 15px;"></i>
            <h3 style="margin:0 0 10px 0;">تأكيد الحذف</h3>
            <p id="confirmText" style="color:#888; font-size: 0.9rem; margin-bottom: 25px;">هل أنت متأكد من حذف هذا العنصر؟</p>
            <div style="display: flex; gap: 10px;">
                <button id="confirmYes" class="btn-submit" style="flex:1; background: var(--danger); border-color: var(--danger); color: white;">نعم، احذف</button>
                <button id="confirmNo" class="btn-report-cancel" style="flex:1;">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header"><h2>تعديل التعليق</h2></div>
            <textarea id="editInput" class="modal-textarea" style="min-height: 150px;"></textarea>
            <div class="modal-actions">
                <button id="saveEditBtn" class="btn-submit">حفظ التغييرات</button>
                <button onclick="document.getElementById('editModal').style.display='none'" class="btn-report-cancel">إلغاء</button>
            </div>
        </div>
    </div>

    <div class="v-header">
        <div class="nav-controls">
             <button id="nextBtn" class="nav-btn-header">»</button>
        </div>
        <span class="chapter-title" id="chapterDisplay">...</span>
        <div class="nav-controls">
            <button id="prevBtn" class="nav-btn-header">«</button>
        </div>
    </div>

    <div class="v-container" id="engine"></div>

    <div class="comments-container">
        <h3 style="margin-bottom: 20px; border-right: 4px solid var(--p); padding-right: 10px;">التعليقات</h3>
        
        <div class="comments-filter">
            <button class="filter-btn active" id="sort-newest" onclick="setSort('newest')">الأحدث</button>
            <button class="filter-btn" id="sort-most_liked" onclick="setSort('most_liked')">الأكثر تفاعلاً</button>
        </div>

        <div class="input-group">
            <textarea id="commentMsg" rows="3" placeholder="ما رأيك في هذا الفصل؟"></textarea>
            <div class="options-row">
                <label class="spoiler-check">
                    <input type="checkbox" id="isSpoiler"> يحتوي على حرق؟
                </label>
                <button class="btn-submit" id="sendCommentBtn">نشر التعليق</button>
            </div>
        </div>

        <div id="commentsList"></div>
    </div>

    <div id="reportModal" class="modal-overlay">
        <div class="modal-content">
            <span class="modal-close" onclick="closeReportModal()">&times;</span>
            <div class="modal-header">
                <i id="reportHeaderIcon" class="fas fa-exclamation-triangle"></i>
                <h2 id="reportModalTitle">تقديم بلاغ</h2>
                <p id="reportModalDesc">ساعدنا في الحفاظ على جودة المحتوى.</p>
            </div>
            
            <div class="report-target-box">
                <span id="reportTargetLabel">المحتوى:</span>
                <div id="reportTargetText">...</div>
            </div>

            <label class="form-label">سبب البلاغ *</label>
            
            <div class="custom-select-wrapper">
                <div class="custom-select-trigger" id="customSelectTrigger">
                    <span>...اختر سبباً</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="custom-options" id="customOptions">
                    </div>
                <input type="hidden" id="reportReason" value="">
            </div>

            <label class="form-label">تفاصيل إضافية (اختياري)</label>
            <textarea id="reportDetails" class="modal-textarea" placeholder="اشرح المشكلة بالتفصيل لمساعدتنا في المعالجة..."></textarea>

            <div class="modal-actions">
                <button class="btn-report-send" id="submitReportBtn">إرسال البلاغ</button>
                <button class="btn-report-cancel" onclick="closeReportModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <div class="v-footer">
        <div class="footer-btn btn-report-issue" onclick="openIssueReport()">
            <i class="fas fa-flag" style="margin-left: 10px;"></i> الإبلاغ عن مشكلة في الفصل
        </div>
        <p id="endText" style="color:#eee; font-weight:bold;"></p>
        <a id="listLink" href="reader.html" class="footer-btn btn-list">معلومات القصة ☰</a>
        <a href="index.html" class="footer-btn btn-home">الرئيسية 🏠</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, set, push, onValue, remove, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaosiZQoPCo4wdlSDy6UYs0b2PWbkkWXs",
            authDomain: "igrismanga-db.firebaseapp.com",
            databaseURL: "https://igrismanga-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "igrismanga-db",
            storageBucket: "igrismanga-db.appspot.com",
            appId: "1:40861137290:web:03cd9be7175620d4e23073"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        const IgrisCache = {
            save: (key, data) => { localStorage.setItem(`igris_${key}`, JSON.stringify(data)); },
            load: (key) => { const d = localStorage.getItem(`igris_${key}`); return d ? JSON.parse(d) : null; },
            clear: (key) => { localStorage.removeItem(`igris_${key}`); }
        };

        let currentUser = null;
        let currentSort = 'newest';
        let localCommentsCache = [];
        let activeReportData = null;

        const reportOptions = {
            comment: [
                { val: "spam", text: "رسائل غير مرغوب فيها (Spam)" },
                { val: "harassment", text: "تحرش أو تنمر" },
                { val: "spoiler", text: "حرق للأحداث بدون وسم" },
                { val: "inappropriate", text: "محتوى غير لائق / بذيء" },
                { val: "hate_speech", text: "خطاب كراهية أو تمييز" },
                { val: "other", text: "سبب آخر" }
            ],
            issue: [
                { val: "missing_pages", text: "صفحات مفقودة من الفصل" },
                { val: "bad_translation", text: "ترجمة سيئة أو غير مفهومة" },
                { val: "order_error", text: "ترتيب الصفحات خاطئ" },
                { val: "quality_issue", text: "جودة الصور ضعيفة جداً" },
                { val: "wrong_chapter", text: "هذا الفصل لا ينتمي لهذه المانجا" },
                { val: "broken_images", text: "الصور لا تظهر (روابط معطلة)" }
            ]
        };

        const fullBtn = document.getElementById('toggleFullscreen');
        fullBtn.onclick = () => {
            const isFull = document.body.classList.toggle('fullscreen-mode');
            fullBtn.querySelector('i').className = isFull ? 'fas fa-compress' : 'fas fa-expand';
            showIgrisAlert(isFull ? "تم تفعيل وضع التوسيع" : "تم الغاء وضع التوسيع");
        };

        const trigger = document.getElementById('customSelectTrigger');
        const optionsContainer = document.getElementById('customOptions');
        const hiddenInput = document.getElementById('reportReason');

        trigger.onclick = (e) => {
            e.stopPropagation();
            optionsContainer.classList.toggle('open');
            trigger.querySelector('i').classList.toggle('fa-chevron-up');
        };

        window.updateReportOptions = (type) => {
            optionsContainer.innerHTML = '';
            reportOptions[type].forEach(opt => {
                const div = document.createElement('div');
                div.className = 'custom-option';
                div.setAttribute('data-value', opt.val);
                div.innerText = opt.text;
                div.onclick = () => {
                    hiddenInput.value = opt.val;
                    trigger.querySelector('span').innerText = opt.text;
                    optionsContainer.querySelectorAll('.custom-option').forEach(o => o.classList.remove('selected'));
                    div.classList.add('selected');
                    optionsContainer.classList.remove('open');
                    trigger.querySelector('i').classList.remove('fa-chevron-up');
                };
                optionsContainer.appendChild(div);
            });
        };

        window.onclick = () => {
            optionsContainer.classList.remove('open');
            trigger.querySelector('i').classList.remove('fa-chevron-up');
        };

        window.showIgrisAlert = (msg) => {
            const alertBox = document.getElementById('igrisAlert');
            const alertMsg = document.getElementById('igrisAlertMsg');
            alertMsg.innerText = msg;
            alertBox.classList.add('show');
            setTimeout(() => { alertBox.classList.remove('show'); }, 3000);
        };

        window.igrisConfirm = (text) => {
            return new Promise((resolve) => {
                const modal = document.getElementById('confirmModal');
                const btnYes = document.getElementById('confirmYes');
                const btnNo = document.getElementById('confirmNo');
                document.getElementById('confirmText').innerText = text;
                modal.style.display = 'flex';
                btnYes.onclick = () => { modal.style.display = 'none'; resolve(true); };
                btnNo.onclick = () => { modal.style.display = 'none'; resolve(false); };
            });
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
        });

        const params = new URLSearchParams(window.location.search);
        const mangaId = params.get('id'); 
        const rawCh = params.get('ch') || "1";
        const currentCh = rawCh.replace(/\D/g, "") || "1"; 

        window.openIssueReport = () => {
            const icon = document.getElementById('reportHeaderIcon');
            icon.className = 'fas fa-bug';
            icon.style.color = 'var(--warning)';
            document.getElementById('reportModalTitle').innerText = "إبلاغ عن خلل في الفصل";
            document.getElementById('reportModalDesc').innerText = "ساعدنا في تحسين تجربة القراءة من خلال التبليغ عن مشاكل الترجمة أو الصور.";
            document.getElementById('reportTargetLabel').innerText = "الفصل المستهدف:";
            document.getElementById('reportTargetText').innerText = `مشكلة تقنية في الفصل رقم ${currentCh}`;
            
            updateReportOptions('issue');
            hiddenInput.value = "";
            trigger.querySelector('span').innerText = "...ما هي المشكلة؟";
            
            document.getElementById('reportModal').style.display = 'flex';
            activeReportData = { type: 'issue' };
        };

        function timeAgo(date) {
            if(!date) return "غير معروف";
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);
            if (seconds < 60) return "الآن";
            let interval = seconds / 31536000;
            if (interval > 1) return "منذ سنة";
            interval = seconds / 2592000;
            if (interval > 1) return "منذ شهر";
            interval = seconds / 86400;
            if (interval > 1) return "منذ " + Math.floor(interval) + " يوم";
            interval = seconds / 3600;
            if (interval > 1) return "منذ " + Math.floor(interval) + " ساعة";
            interval = seconds / 60;
            if (interval > 1) return "منذ " + Math.floor(interval) + " دقيقة";
            return "الآن";
        }

        window.setSort = (type) => {
            currentSort = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`sort-${type}`);
            if(activeBtn) activeBtn.classList.add('active');
            refreshCommentsUI(); 
        };

        window.toggleLike = async (cid, replyId = null) => {
            if (!currentUser) return showIgrisAlert("سجل دخولك للتفاعل!");
            const path = replyId 
                ? `comments/${mangaId}/${currentCh}/${cid}/replies/${replyId}/reactions_v2/like/${currentUser.uid}`
                : `comments/${mangaId}/${currentCh}/${cid}/reactions_v2/like/${currentUser.uid}`;
            const likeRef = ref(db, path);
            const snap = await get(likeRef);
            if (snap.exists()) await set(likeRef, null);
            else await set(likeRef, true); 
        };

        window.deleteComment = async (cid, replyId = null) => {
            const confirmed = await igrisConfirm("هل تريد حقاً حذف هذا التعليق؟");
            if (!confirmed) return;
            const path = replyId ? `comments/${mangaId}/${currentCh}/${cid}/replies/${replyId}` : `comments/${mangaId}/${currentCh}/${cid}`;
            await remove(ref(db, path));
            showIgrisAlert("تم الحذف بنجاح");
        };

        window.editComment = (cid, replyId = null) => {
            const el = document.getElementById(replyId ? `reply-text-${replyId}` : `comment-text-${cid}`);
            const input = document.getElementById('editInput');
            input.value = el.innerText;
            document.getElementById('editModal').style.display = 'flex';
            document.getElementById('saveEditBtn').onclick = async () => {
                const newText = input.value.trim();
                if (newText) {
                    const path = replyId ? `comments/${mangaId}/${currentCh}/${cid}/replies/${replyId}` : `comments/${mangaId}/${currentCh}/${cid}`;
                    await update(ref(db, path), { text: newText, edited: true, lastEditAt: serverTimestamp() });
                    document.getElementById('editModal').style.display = 'none';
                    showIgrisAlert("تم التعديل");
                }
            };
        };

        window.openReportModal = (cid, replyId = null) => {
            const icon = document.getElementById('reportHeaderIcon');
            icon.className = 'fas fa-exclamation-triangle';
            icon.style.color = 'var(--danger)';
            document.getElementById('reportModalTitle').innerText = "إبلاغ عن مخالفة";
            document.getElementById('reportModalDesc').innerText = "ساعدنا في الحفاظ على مجتمع آمن ومحترم للجميع.";
            document.getElementById('reportTargetLabel').innerText = "محتوى التعليق:";
            const textEl = document.getElementById(replyId ? `reply-text-${replyId}` : `comment-text-${cid}`);
            document.getElementById('reportTargetText').innerText = textEl.innerText;
            
            updateReportOptions('comment');
            hiddenInput.value = "";
            trigger.querySelector('span').innerText = "...اختر سبب المخالفة";
            
            document.getElementById('reportModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            activeReportData = { cid, replyId, type: 'comment' };
        };

        window.closeReportModal = () => {
            document.getElementById('reportModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            document.getElementById('reportReason').value = "";
            document.getElementById('reportDetails').value = "";
            activeReportData = null;
        };

        document.getElementById('submitReportBtn').onclick = async () => {
            const reason = document.getElementById('reportReason').value;
            const details = document.getElementById('reportDetails').value;
            if (!reason) return showIgrisAlert("يرجى اختيار سبب للبلاغ");
            
            const reportPath = activeReportData.type === 'issue' ? `reports/chapters_issues/${mangaId}` : `reports/comments_violations`;
            
            await push(ref(db, reportPath), {
                mangaId, ch: currentCh, 
                targetId: activeReportData.cid || null, 
                replyId: activeReportData.replyId || null,
                category: activeReportData.type,
                reason: reason, 
                details: details,
                reporterUid: currentUser?.uid || "anonymous", 
                timestamp: serverTimestamp()
            });
            showIgrisAlert("شكراً لك، تم إرسال البلاغ بنجاح.");
            closeReportModal();
        };

        window.sendComment = async (parentId = null) => {
            if (!currentUser) return showIgrisAlert("سجل دخولك للتعليق!");
            const msgId = parentId ? `replyMsg-${parentId}` : 'commentMsg';
            const msg = document.getElementById(msgId).value.trim();
            const isSpoiler = parentId ? false : document.getElementById('isSpoiler').checked;
            if (!msg) return;
            const path = parentId ? `comments/${mangaId}/${currentCh}/${parentId}/replies` : `comments/${mangaId}/${currentCh}`;
            try {
                const newCommentRef = push(ref(db, path));
                await set(newCommentRef, {
                    uid: currentUser.uid, 
                    user: currentUser.displayName || "مستخدم مجهول",
                    avatar: currentUser.photoURL || "", 
                    text: msg, isSpoiler: isSpoiler,
                    timestamp: serverTimestamp(),
                    reactions_v2: {} 
                });
                document.getElementById(msgId).value = '';
                if(parentId) document.getElementById(`reply-box-${parentId}`).style.display = 'none';
                showIgrisAlert("تم النشر");
            } catch (e) { showIgrisAlert("حدث خطأ، جرب لاحقاً"); }
        };

        window.toggleReplyBox = (id) => {
            const box = document.getElementById(`reply-box-${id}`);
            if(box) box.style.display = box.style.display === 'none' ? 'block' : 'none';
        };

        window.expandText = (el, btnId) => {
            el.classList.toggle('expanded');
            document.getElementById(btnId).innerText = el.classList.contains('expanded') ? "عرض أقل" : "عرض المزيد";
        };

        function listenToComments() {
            onValue(ref(db, `comments/${mangaId}/${currentCh}`), (snapshot) => {
                localCommentsCache = [];
                snapshot.forEach(child => { 
                    const data = child.val();
                    localCommentsCache.push({...data, id: child.key}); 
                });
                refreshCommentsUI();
            });
        }

        function refreshCommentsUI() {
            const list = document.getElementById('commentsList');
            if(!list) return;
            if(localCommentsCache.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#444; padding:30px;">لا توجد تعليقات بعد..</p>';
                return;
            }
            let comments = [...localCommentsCache];
            if (currentSort === 'newest') comments.sort((a,b) => b.timestamp - a.timestamp);
            if (currentSort === 'most_liked') {
                comments.sort((a,b) => {
                    const countA = a.reactions_v2 && a.reactions_v2.like ? Object.keys(a.reactions_v2.like).length : 0;
                    const countB = b.reactions_v2 && b.reactions_v2.like ? Object.keys(b.reactions_v2.like).length : 0;
                    return countB - countA;
                });
            }
            list.innerHTML = ''; 
            comments.forEach((c) => {
                const cLikeCount = c.reactions_v2 && c.reactions_v2.like ? Object.keys(c.reactions_v2.like).length : 0;
                const isCLiked = currentUser && c.reactions_v2 && c.reactions_v2.like && c.reactions_v2.like[currentUser.uid];
                
                let repliesHtml = '';
                if(c.replies) {
                    Object.entries(c.replies).forEach(([rid, r]) => {
                        const rLikeCount = r.reactions_v2 && r.reactions_v2.like ? Object.keys(r.reactions_v2.like).length : 0;
                        const isRLiked = currentUser && r.reactions_v2 && r.reactions_v2.like && r.reactions_v2.like[currentUser.uid];
                        repliesHtml += `
                        <div class="reply-item">
                            <div class="user-info">
                                <span class="user-name" style="font-size:0.8rem;">${r.user}</span>
                                <span class="comment-date">${timeAgo(r.timestamp)}</span>
                            </div>
                            <div class="comment-text" id="reply-text-${rid}">${r.text}</div>
                            <div class="comment-actions">
                                <div class="action-link ${isRLiked ? 'active' : ''}" onclick="toggleLike('${c.id}', '${rid}')">
                                    <i class="${isRLiked ? 'fas' : 'far'} fa-heart"></i> <span class="like-count">${rLikeCount}</span>
                                </div>
                                ${currentUser && currentUser.uid === r.uid ? `<div class="action-link" onclick="editComment('${c.id}', '${rid}')">تعديل</div><div class="action-link" onclick="deleteComment('${c.id}', '${rid}')">حذف</div>` : ''}
                                <div class="action-link report-btn" onclick="openReportModal('${c.id}', '${rid}')">إبلاغ</div>
                            </div>
                        </div>`;
                    });
                }
                const card = document.createElement('div');
                card.className = 'comment-card';
                card.innerHTML = `
                    <div class="comment-header">
                        <div class="user-info">
                            <div class="user-avatar">${c.avatar ? `<img src="${c.avatar}">` : c.user.charAt(0)}</div>
                            <div><span class="user-name">${c.user}</span><div class="comment-date">${timeAgo(c.timestamp)} ${c.edited ? '(معدل)' : ''}</div></div>
                            ${c.isSpoiler ? '<span class="spoiler-tag">حرق!</span>' : ''}
                        </div>
                    </div>
                    <div class="comment-text ${c.isSpoiler ? 'is-spoiler' : ''}" id="comment-text-${c.id}" onclick="this.classList.remove('is-spoiler')">${c.text}</div>
                    <div class="show-more-btn" id="more-${c.id}" onclick="expandText(document.getElementById('comment-text-${c.id}'), 'more-${c.id}')">عرض المزيد</div>
                    <div class="comment-actions">
                        <div class="action-link ${isCLiked ? 'active' : ''}" onclick="toggleLike('${c.id}')">
                            <i class="${isCLiked ? 'fas' : 'far'} fa-heart"></i> <span class="like-count">${cLikeCount}</span>
                        </div>
                        <div class="action-link" onclick="toggleReplyBox('${c.id}')"><i class="fas fa-reply"></i> رد</div>
                        ${currentUser && currentUser.uid === c.uid ? `<div class="action-link" onclick="editComment('${c.id}')">تعديل</div><div class="action-link" onclick="deleteComment('${c.id}')">حذف</div>` : ''}
                        <div class="action-link report-btn" onclick="openReportModal('${c.id}')">إبلاغ</div>
                    </div>
                    <div id="reply-box-${c.id}" class="input-group" style="display:none; margin-top:10px;">
                        <textarea id="replyMsg-${c.id}" placeholder="اكتب ردك.."></textarea>
                        <button class="btn-submit" onclick="sendComment('${c.id}')">إرسال الرد</button>
                    </div>
                    <div class="replies-container">${repliesHtml}</div>`;
                list.appendChild(card);
            });
        }

        async function loadViewer() {
            try {
                const snapshot = await get(ref(db, `manga/${mangaId}`));
                if (snapshot.exists()) {
                    const mangaData = snapshot.val();
                    const chapters = mangaData.chapters || {};
                    const chapterData = chapters[currentCh];
                    const availableChapters = Object.keys(chapters).map(Number).sort((a, b) => a - b);
                    const engine = document.getElementById('engine');
                    if (chapterData && chapterData.pages) {
                        chapterData.pages.forEach(url => {
                            const img = document.createElement('img');
                            img.src = url; img.className = 'v-page'; img.loading = 'lazy';
                            engine.appendChild(img);
                        });
                    }
                    document.getElementById('chapterDisplay').innerText = `الفصل ${currentCh}`;
                    document.getElementById('endText').innerText = `نهاية الفصل ${currentCh} - ${mangaData.title}`;
                    const nextCh = availableChapters.find(n => n > currentCh);
                    const prevCh = [...availableChapters].reverse().find(n => n < currentCh);
                    if (nextCh) document.getElementById('nextBtn').onclick = () => window.location.href = `Viewer.html?id=${mangaId}&ch=${nextCh}`;
                    else document.getElementById('nextBtn').classList.add('disabled');
                    if (prevCh) document.getElementById('prevBtn').onclick = () => window.location.href = `Viewer.html?id=${mangaId}&ch=${prevCh}`;
                    else document.getElementById('prevBtn').classList.add('disabled');
                    document.getElementById('listLink').href = `reader.html?id=${mangaId}`;
                }
                document.getElementById('loading').style.display = 'none';
                listenToComments();
            } catch (e) { document.getElementById('loading').style.display = 'none'; }
        }

        if (mangaId) loadViewer(); else window.location.href = 'index.html';
        document.getElementById('sendCommentBtn').onclick = () => window.sendComment();
    </script>
</body>
</html>
