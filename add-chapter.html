<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | إدارة المحتوى الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #7d2ae8; --bg: #050505; --card: #151515; --text: #fff; --border: #252525; --accent: #ff0000; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 80px; /* مساحة للزر العائم */ }
        
        #authGuard { text-align: center; margin-top: 150px; font-size: 1.2rem; color: var(--p); cursor: pointer; user-select: none; }
        
        /* تصميم الحاوية الرئيسي */
        .admin-box { display: none; width: 90%; max-width: 800px; background: var(--card); border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 15px 50px rgba(0,0,0,0.7); overflow: hidden; margin-top: 40px; margin-bottom: 40px; animation: boxEnter 0.5s ease; }
        @keyframes boxEnter { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        /* ستايل التبويبات */
        .tabs { display: flex; background: #111; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 18px; border: none; background: none; color: #666; font-family: 'Cairo'; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .tab-btn.active { color: var(--p); background: rgba(125, 42, 232, 0.05); border-bottom: 3px solid var(--p); }
        .tab-btn:hover:not(.active) { color: #aaa; background: rgba(255,255,255,0.01); }

        /* المحتوى */
        .form-content { padding: 40px; display: none; }
        .form-content.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h2 { font-weight: 900; color: var(--p); margin-top: 0; margin-bottom: 30px; display: flex; align-items: center; gap: 12px; font-size: 1.8rem; }
        label { display: block; margin: 20px 0 10px; font-size: 0.9rem; color: #aaa; font-weight: bold; }
        
        input, select, textarea { width: 100%; padding: 14px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 12px; outline: none; font-family: 'Cairo'; box-sizing: border-box; transition: 0.3s; font-size: 0.95rem; }
        input:focus, textarea:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(125, 42, 232, 0.15); background: #080808; }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        /* ستايل التصنيفات */
        .genres-container { display: flex; flex-wrap: wrap; gap: 10px; background: #000; padding: 20px; border-radius: 12px; border: 1px solid var(--border); max-height: 250px; overflow-y: auto; margin-bottom: 10px; }
        .genre-chip { background: #1a1a1a; padding: 6px 15px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; border: 1px solid #333; transition: 0.3s; user-select: none; color: #ccc; }
        .genre-chip.selected { background: var(--p); color: white; border-color: var(--p); box-shadow: 0 0 15px rgba(125, 42, 232, 0.3); font-weight: bold; }
        .genre-chip:hover:not(.selected) { border-color: #555; background: #222; color: #fff; }

        /* الأزرار الرئيسية */
        button.main-btn { width: 100%; padding: 16px; background: var(--gradient, var(--p)); color: white; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 1.1rem; margin-top: 30px; box-shadow: 0 5px 20px rgba(125, 42, 232, 0.2); display: flex; align-items: center; justify-content: center; gap: 12px; }
        button.main-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(125, 42, 232, 0.4); }
        button.main-btn:disabled { background: #333 !important; cursor: not-allowed; transform: none; box-shadow: none; opacity: 0.5; }
        
        .preview-img { width: 110px; height: 155px; border-radius: 15px; border: 3px solid var(--p); object-fit: cover; margin-top: 20px; display: none; box-shadow: var(--p) 0 15px 30px -10px; transition: 0.3s; }

        /* ستايل شريط التقدم */
        .progress-container { width: 100%; background: #222; height: 10px; border-radius: 10px; margin-top: 25px; display: none; overflow: hidden; border: 1px solid #333; }
        #progressBar { height: 100%; width: 0%; background: var(--p); transition: 0.4s; box-shadow: 0 0 10px var(--p); }

        /* تلميحات وشارات */
        .smart-hint { font-size: 0.8rem; color: #4CAF50; margin-top: -10px; margin-bottom: 15px; display: none; background: rgba(76, 175, 80, 0.1); padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(76, 175, 80, 0.2); }
        .page-badge { background: rgba(76, 175, 80, 0.15); color: #4CAF50; padding: 4px 12px; border-radius: 8px; font-size: 0.9rem; font-weight: bold; border: 1px solid rgba(76, 175, 80, 0.3); }

        /* =========================================
           ستايل زر العودة للرئيسية الاحترافي (الجديد)
           ========================================= */
        .floating-back-btn {
            position: fixed; bottom: 25px; left: 25px; z-index: 1000;
            text-decoration: none; font-family: 'Cairo', sans-serif;
        }
        .back-btn-content {
            background: rgba(21, 21, 21, 0.8); /* تصميم زجاجي */
            color: #aaa; padding: 12px 20px; border-radius: 50px;
            border: 1px solid var(--border); backdrop-filter: blur(10px);
            display: flex; align-items: center; gap: 10px;
            font-size: 0.9rem; font-weight: 700; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }
        .back-btn-content i { font-size: 1rem; transition: 0.3s; }
        /* تأثيرات التحليق (Hover) */
        .floating-back-btn:hover .back-btn-content {
            color: #fff; border-color: var(--p);
            background: rgba(125, 42, 232, 0.1);
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 8px 25px rgba(125, 42, 232, 0.3);
        }
        .floating-back-btn:hover i { transform: translateX(5px); color: var(--p); }

        /* تحسينات للشاشات الصغيرة */
        @media (max-width: 600px) {
            .row { grid-template-columns: 1fr; gap: 10px; }
            .form-content { padding: 20px; }
            h2 { font-size: 1.5rem; }
            .tab-btn { padding: 15px 10px; font-size: 0.85rem; }
            .floating-back-btn { bottom: 15px; left: 15px; }
            .back-btn-content { padding: 10px 16px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div id="authGuard">
        <i class="fas fa-shield-alt fa-spin" style="font-size: 4rem; margin-bottom: 20px;"></i><br>
        <span id="guardText">جاري التحقق من هوية المالك...</span>
    </div>

    <div class="admin-box" id="adminPanel">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'newManga')">
                <i class="fas fa-book-medical"></i> إضافة قصة جديدة
            </button>
            <button class="tab-btn" onclick="switchTab(event, 'newChapter')">
                <i class="fas fa-file-upload"></i> إضافة فصول
            </button>
        </div>

        <div id="newManga" class="form-content active">
            <h2><i class="fas fa-magic"></i> إنشاء ذكي للعمل</h2>
            
            <label>رابط الغلاف (الصقه أولاً لتوليد البيانات تلقائياً):</label>
            <input type="text" id="mCover" placeholder="رابط مباشر للصورة (مثل ImgBB)" oninput="smartAutoFill(this.value)">
            <div id="smartHint" class="smart-hint"><i class="fas fa-check-circle"></i> تم استخراج المعرف بنجاح من الرابط!</div>
            <center><img id="coverPrev" class="preview-img"></center>

            <div class="row">
                <div>
                    <label>عنوان القصة:</label>
                    <input type="text" id="mTitle" placeholder="مثال: Solo Leveling" oninput="generateID(this.value)">
                </div>
                <div>
                    <label>المعرف الفريد (ID):</label>
                    <input type="text" id="mID" readonly placeholder="سيظهر تلقائياً">
                </div>
            </div>

            <label>الوصف (ملخص قصير):</label>
            <textarea id="mDesc" rows="3" placeholder="اكتب وصفاً جذاباً للقصة هنا..."></textarea>

            <div class="row">
                <div>
                    <label>النوع:</label>
                    <select id="mType">
                        <option>مانهوا</option>
                        <option>مانجا</option>
                        <option>مانها</option>
                        <option>كوميكس</option>
                        <option>رواية</option>
                    </select>
                </div>
                <div>
                    <label>الحالة:</label>
                    <select id="mStatus">
                        <option>مستمرة</option>
                        <option>مكتملة</option>
                        <option>متوقفة</option>
                    </select>
                </div>
            </div>

            <label>التصنيفات (اضغط للاختيار):</label>
            <div class="genres-container" id="genresList"></div>

            <button class="main-btn" onclick="publishManga()">
                <i class="fas fa-save"></i> حفظ العمل ونشره
            </button>
        </div>

        <div id="newChapter" class="form-content">
            <h2><i class="fas fa-bolt"></i> رفع فصل سريع</h2>
            
            <label>اختر العمل المراد تحديثه:</label>
            <select id="mangaSelect" style="border-right: 4px solid var(--p);"><option value="">-- جاري التحميل --</option></select>
            
            <div class="row" style="margin-top: 20px;">
                <div>
                    <label>رقم الفصل:</label>
                    <input type="number" id="chapterNumber" placeholder="مثال: 105" step="any">
                </div>
                <div>
                    <label>حالة الروابط المكتشفة:</label>
                    <div style="padding: 13px; background: #000; border-radius: 12px; border: 1px solid var(--border); text-align: center;">
                        <span id="pageCounter" class="page-badge">0 صفحة جاهزة</span>
                    </div>
                </div>
            </div>

            <label>روابط الصفحات (الصق القائمة بالكامل، رابط في كل سطر):</label>
            <textarea id="pagesUrls" rows="12" placeholder="ضع الروابط المباشرة هنا..." oninput="countPages(this.value)"></textarea>

            <div class="progress-container" id="pContainer"><div id="progressBar"></div></div>
            
            <button class="main-btn" id="chBtn" onclick="smartPublishChapter()">
                <i class="fas fa-cloud-upload-alt"></i> نشر الفصل الآن
            </button>
        </div>
    </div>

    <a href="i.html" class="floating-back-btn">
        <div class="back-btn-content">
            <span>العودة للرئيسية</span>
            <i class="fas fa-arrow-left"></i>
        </div>
    </a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDaosiZQoPCo4wdlSDy6UYs0b2PWbkkWXs",
          authDomain: "igrismanga-db.firebaseapp.com",
          databaseURL: "https://igrismanga-db-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "igrismanga-db",
          storageBucket: "igrismanga-db.appspot.com",
          appId: "1:40861137290:web:03cd9be7175620d4e23073"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const adminEmail = "almsmmalmhtrf22@gmail.com";
        let isAccessGranted = false;

        // --- نظام التصنيفات الشامل ---
        const allGenres = ["أكشن", "مغامرة", "خيال", "دراما", "رومانسية", "كوميديا", "رعب", "غموض", "نفسي", "شريحة من الحياة", "خارق للطبيعة", "سحر", "فنون قتالية", "تاريخي", "سينين", "شونين", "شوجو", "جوزي", "ايسيكاي", "نظام", "ألعاب", "زومبي", "مصاص دماء", "مدرسي", "رياضة", "خيال علمي", "ميكا", "عسكري", "جريمة", "تشويق", "ويب تون", "ملون", "قوى خارقة", "أرواح", "شياطين", "طبخ", "فضاء", "سفر عبر الزمن", "انتقام", "حريم", "رواية"];
        const genresDiv = document.getElementById('genresList');
        allGenres.sort().forEach(g => {
            const span = document.createElement('span');
            span.className = 'genre-chip';
            span.innerText = g;
            span.onclick = () => span.classList.toggle('selected');
            genresDiv.appendChild(span);
        });

        // --- وظيفة العد الذكي للصفحات ---
        window.countPages = (val) => {
            const count = val.split('\n').filter(l => l.trim() !== "").length;
            document.getElementById('pageCounter').innerText = count + " صفحة جاهزة";
        };

        // --- الرفع الذكي والاحترافي للفصل ---
        window.smartPublishChapter = async () => {
            const id = document.getElementById('mangaSelect').value;
            const chNum = document.getElementById('chapterNumber').value;
            const rawUrls = document.getElementById('pagesUrls').value.trim();
            const btn = document.getElementById('chBtn');
            const bar = document.getElementById('progressBar');
            const pCon = document.getElementById('pContainer');

            if(!id || !chNum || !rawUrls) return alert("يا بطل، أكمل البيانات أولاً!");

            const pagesArray = rawUrls.split('\n').map(u => u.trim()).filter(u => u !== "");

            // تفعيل واجهة الرفع الاحترافية
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق والنشر...';
            pCon.style.display = 'block';
            bar.style.width = '30%';

            try {
                // 1. حفظ بيانات الفصل في قاعدة البيانات
                await set(ref(db, `manga/${id}/chapters/${chNum}`), {
                    pages: pagesArray,
                    timestamp: Date.now()
                });
                bar.style.width = '70%';

                // 2. تحديث توقيت القصة لتتصدر الصفحة الرئيسية (Timestamp الرئيسي)
                await set(ref(db, `manga/${id}/timestamp`), Date.now());
                bar.style.width = '100%';

                setTimeout(() => {
                    alert("🚀 تم نشر الفصل بنجاح وتحديث ترتيب القصة!");
                    location.reload();
                }, 500);
            } catch(e) {
                alert("❌ خطأ في الرفع: " + e.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> نشر الفصل الآن';
                bar.style.width = '0%';
                pCon.style.display = 'none';
            }
        };

        // --- الوظائف الأساسية والذكية ---
        window.smartAutoFill = (url) => {
            const mID = document.getElementById('mID');
            const hint = document.getElementById('smartHint');
            const img = document.getElementById('coverPrev');
            if(url) {
                img.src = url; img.style.display = 'block';
                // استخراج اسم الملف كـ ID
                try {
                    let part = url.split('/').pop().split('.')[0].replace(/[^\w-]/g, '').toLowerCase();
                    if(part.length > 3) {
                        mID.value = part;
                        hint.style.display = 'block';
                    } else { hint.style.display = 'none'; }
                } catch(e) { hint.style.display = 'none'; }
            } else {
                img.style.display = 'none'; hint.style.display = 'none';
            }
        };

        window.generateID = (val) => { document.getElementById('mID').value = val.toLowerCase().replace(/ /g, '-').replace(/[^\w-]/g, ''); };

        // --- نظام حماية المالك ---
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === adminEmail) { showPanel(); }
            else { 
                setTimeout(() => { 
                    if(!isAccessGranted) {
                        document.getElementById('guardText').innerText = "غير مصرح لك بالدخول!";
                        setTimeout(() => window.location.href = 'i.html', 1500);
                    }
                }, 4000); 
            }
        });

        // دخول الطوارئ
        document.getElementById('authGuard').onclick = () => { 
            if(prompt("ادخل رمز المالك للوصول السريع:") === "igris2026") showPanel(); 
        };

        function showPanel() {
            isAccessGranted = true;
            document.getElementById('authGuard').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadMangaList();
        }

        window.switchTab = (evt, tabId) => {
            document.querySelectorAll('.form-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            evt.currentTarget.classList.add('active');
        };

        // جلب قائمة المانجا للفصول
        function loadMangaList() {
            onValue(ref(db, 'manga'), (snapshot) => {
                const select = document.getElementById('mangaSelect');
                select.innerHTML = '<option value="">-- اختر القصة --</option>';
                const data = snapshot.val();
                if(data) { 
                    // ترتيب الاسم أبجدياً لجعل القائمة أسهل
                    const sortedKeys = Object.keys(data).sort((a,b) => data[a].title.localeCompare(data[b].title));
                    sortedKeys.forEach(id => { 
                        select.innerHTML += `<option value="${id}">${data[id].title}</option>`; 
                    }); 
                }
            });
        }

        // نشر عمل جديد
        window.publishManga = async () => {
            const id = document.getElementById('mID').value;
            const title = document.getElementById('mTitle').value;
            const cover = document.getElementById('mCover').value;
            const desc = document.getElementById('mDesc').value;
            const type = document.getElementById('mType').value;
            const status = document.getElementById('mStatus').value;
            const selectedGenres = Array.from(document.querySelectorAll('.genre-chip.selected')).map(el => el.innerText);
            
            if(!id || !title || !cover) return alert("يا مدير، أكمل البيانات الأساسية!");
            
            try {
                await set(ref(db, `manga/${id}`), { 
                    title, cover, desc, type, status, genres: selectedGenres, 
                    timestamp: Date.now() 
                });
                alert("🎉 تم إنشاء القصة بنجاح!"); 
                location.reload();
            } catch(e) { alert("❌ خطأ: " + e.message); }
        };
    </script>
</body>
</html>
